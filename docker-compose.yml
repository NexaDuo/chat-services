# docker-compose.yml (Local Unified Setup — overrides only)
#
# This file is INCOMPLETE on its own: it only carries cross-stack `depends_on`
# overrides for local/CI dev. The actual service definitions live in
# deploy/docker-compose.{shared,chatwoot,dify,nexaduo}.yml.
#
# Compose v2.30+ rejects redefining services that came from an `include:`
# directive ("conflicts with imported resource"). To keep the permissive merge
# behavior we used before, we now chain files via `-f` (or via the COMPOSE_FILE
# env in `.env`) instead of `include:`.
#
# How to run locally:
#   1) Copy `.env.example` to `.env` (it sets COMPOSE_FILE for you), then
#      simply run `docker compose up -d`.
#   2) Or pass the chain explicitly:
#      docker compose \
#        -f deploy/docker-compose.shared.yml \
#        -f deploy/docker-compose.chatwoot.yml \
#        -f deploy/docker-compose.dify.yml \
#        -f deploy/docker-compose.nexaduo.yml \
#        -f docker-compose.yml \
#        up -d

services:
  # Local overrides to enforce cross-stack dependencies which Coolify ignores
  chatwoot-rails:
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dify-web:
    ports:
      - "3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dify-api:
    ports:
      - "5001:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dify-init:
        condition: service_completed_successfully
      dify-sandbox:
        condition: service_started
      dify-plugin-daemon:
        condition: service_started
      dify-ssrf-proxy:
        condition: service_started


  dify-worker:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dify-plugin-daemon:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  evolution-api:
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  middleware:
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  loki:
    volumes:
      # Directory mount (not single-file) — WSL stale-inode hardening (#113/#116).
      - ${PWD}/observability/loki:/etc/loki:ro

  promtail:
    volumes:
      # Directory mount (not single-file) — WSL stale-inode hardening (#113/#116).
      - ${PWD}/observability/promtail:/etc/promtail:ro
      - promtail-data:/var/promtail
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

  grafana:
    # NO host port publish. Grafana is reached via Traefik on chat-network
    # (label grafana.loadbalancer.server.port=3000 in deploy/docker-compose.nexaduo.yml)
    # and, on the tunnel, via https://grafana.nexaduo.com. Publishing 3002 on the
    # host collided with an unrelated stack (typebot-builder) that grabbed 3002
    # during the 2026-06-30 WSL restart race → grafana Exit 128
    # "Bind for 0.0.0.0:3002 failed: port is already allocated" and it never
    # recovered (see #113). The host is shared; do not re-publish this port.
    environment:
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: postgres
      GF_DATABASE_PASSWORD: '${POSTGRES_PASSWORD}'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${PWD}/observability/grafana/provisioning:/etc/grafana/provisioning:ro

  prometheus:
    volumes:
      # Directory mount (not single-file) — WSL stale-inode hardening (#113/#116).
      - ${PWD}/observability/prometheus:/etc/prometheus:ro

  postgres:
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${PWD}/infrastructure/postgres/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  self-healing-agent:
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  promtail-data:
  postgres-data:
