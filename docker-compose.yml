# =============================================================================
# NexaDuo — Omnichannel AI Stack
# Chatwoot (hub)  +  Evolution API (WhatsApp)  +  Dify (agent/RAG)  +  Middleware
# Sharing a single Postgres 16 + pgvector and a single Redis 7 instance.
#
# Required version tags documented inline. Bump with care and test locally
# before promoting to production. See docs/plans/first-setup.plan.md.
#
# Expected external reverse proxy (Coolify / Traefik) — NO internal nginx.
# =============================================================================

name: ${COMPOSE_PROJECT_NAME:-nexaduo}

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:

  # ===========================================================================
  # Shared infrastructure
  # ===========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexaduo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Default DB is a throw-away; the init script creates chatwoot/dify/evolution.
      POSTGRES_DB: postgres
      TZ: ${TZ:-UTC}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    networks:
      - chat-network

  redis:
    image: redis:7-alpine
    container_name: nexaduo-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
      - --maxmemory-policy
      - allkeys-lru
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
    networks:
      - chat-network

  # ===========================================================================
  # Chatwoot — inbox/CRM hub
  # Pinned: chatwoot/chatwoot:v4.1.0 (verify against registry before deploy)
  # ===========================================================================
  chatwoot-init:
    image: chatwoot/chatwoot:v4.1.0
    container_name: nexaduo-chatwoot-init
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL}
      DEFAULT_LOCALE: ${CHATWOOT_DEFAULT_LOCALE:-pt_BR}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USERNAME: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      RAILS_LOG_TO_STDOUT: "true"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "==> Running db:chatwoot_prepare (idempotent)";
        bundle exec rails db:chatwoot_prepare;
        echo "==> Chatwoot DB ready.";
    logging: *default-logging
    networks:
      - chat-network

  chatwoot-rails:
    image: chatwoot/chatwoot:v4.1.0
    container_name: nexaduo-chatwoot-rails
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chatwoot-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL}
      INSTALLATION_NAME: ${CHATWOOT_INSTALLATION_NAME:-NexaDuo}
      DEFAULT_LOCALE: ${CHATWOOT_DEFAULT_LOCALE:-pt_BR}
      FORCE_SSL: ${CHATWOOT_FORCE_SSL:-false}
      ENABLE_ACCOUNT_SIGNUP: ${CHATWOOT_ENABLE_ACCOUNT_SIGNUP:-false}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USERNAME: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      ACTIVE_STORAGE_SERVICE: local
      RAILS_LOG_TO_STDOUT: "true"
      MAILER_SENDER_EMAIL: ${CHATWOOT_MAILER_SENDER_EMAIL:-}
      SMTP_ADDRESS: ${CHATWOOT_SMTP_ADDRESS:-}
      SMTP_PORT: ${CHATWOOT_SMTP_PORT:-587}
      SMTP_USERNAME: ${CHATWOOT_SMTP_USERNAME:-}
      SMTP_PASSWORD: ${CHATWOOT_SMTP_PASSWORD:-}
      SMTP_DOMAIN: ${CHATWOOT_SMTP_DOMAIN:-}
      SMTP_AUTHENTICATION: ${CHATWOOT_SMTP_AUTHENTICATION:-plain}
      SMTP_ENABLE_STARTTLS_AUTO: ${CHATWOOT_SMTP_ENABLE_STARTTLS_AUTO:-true}
    ports:
      - "3000:3000"
    volumes:
      - chatwoot-storage:/app/storage
      - chatwoot-public:/app/public
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    logging: *default-logging
    networks:
      - chat-network

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v4.1.0
    container_name: nexaduo-chatwoot-sidekiq
    restart: unless-stopped
    depends_on:
      chatwoot-rails:
        condition: service_started
    env_file: .env
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL}
      DEFAULT_LOCALE: ${CHATWOOT_DEFAULT_LOCALE:-pt_BR}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USERNAME: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      ACTIVE_STORAGE_SERVICE: local
      RAILS_LOG_TO_STDOUT: "true"
    volumes:
      - chatwoot-storage:/app/storage
      - chatwoot-public:/app/public
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    logging: *default-logging
    networks:
      - chat-network

  # ===========================================================================
  # Evolution API v2 — WhatsApp/Instagram bridge → Chatwoot (native integration)
  # ===========================================================================
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: nexaduo-evolution-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_AUTHENTICATION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      LOG_LEVEL: ERROR,WARN,INFO
      LOG_COLOR: "true"
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/2
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      # Integração nativa Evolution → Chatwoot (configurada por-instância via API)
      CHATWOOT_ENABLED: "true"
      CHATWOOT_MESSAGE_READ: "true"
      CHATWOOT_MESSAGE_DELETE: "true"
      CHATWOOT_IMPORT_DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/chatwoot?sslmode=disable
      CHATWOOT_IMPORT_PLACEHOLDER_MEDIA_MESSAGE: "true"
      WEBHOOK_GLOBAL_URL: ${EVOLUTION_WEBHOOK_GLOBAL_URL:-}
      WEBHOOK_GLOBAL_ENABLED: "false"
      TZ: ${TZ:-UTC}
    volumes:
      - evolution-instances:/evolution/instances
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging
    networks:
      - chat-network

  # ===========================================================================
  # Dify — agent engine + RAG (pgvector) — NO internal nginx
  # ===========================================================================
  dify-init:
    image: alpine:latest
    container_name: nexaduo-dify-init
    restart: "no"
    volumes:
      - dify-api-storage:/app/api/storage
    command: chown -R 1001:1001 /app/api/storage
    networks:
      - chat-network

  dify-api:
    image: langgenius/dify-api:1.13.3
    container_name: nexaduo-dify-api
    restart: unless-stopped
    depends_on:
      dify-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dify-sandbox:
        condition: service_started
      dify-plugin-daemon:
        condition: service_started
      dify-ssrf-proxy:
        condition: service_started
    environment:
      MODE: api
      LOG_LEVEL: ${DIFY_LOG_LEVEL:-INFO}
      SECRET_KEY: ${DIFY_SECRET_KEY}
      CONSOLE_API_URL: ${DIFY_CONSOLE_API_URL}
      CONSOLE_WEB_URL: ${DIFY_CONSOLE_WEB_URL}
      SERVICE_API_URL: ${DIFY_SERVICE_API_URL}
      APP_API_URL: ${DIFY_APP_API_URL}
      APP_WEB_URL: ${DIFY_APP_WEB_URL}
      FILES_URL: ${DIFY_SERVICE_API_URL}
      MIGRATION_ENABLED: "true"
      # -- Postgres shared --
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${POSTGRES_HOST:-postgres}
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_DATABASE: dify
      # -- Redis shared (db 0 for Dify) --
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USE_SSL: "false"
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # -- Vector store: pgvector on shared Postgres --
      VECTOR_STORE: ${DIFY_VECTOR_STORE:-pgvector}
      PGVECTOR_HOST: ${POSTGRES_HOST:-postgres}
      PGVECTOR_PORT: ${POSTGRES_PORT:-5432}
      PGVECTOR_USER: ${POSTGRES_USER}
      PGVECTOR_PASSWORD: ${POSTGRES_PASSWORD}
      PGVECTOR_DATABASE: dify
      PGVECTOR_MIN_CONNECTION: 1
      PGVECTOR_MAX_CONNECTION: 5
      # -- Sandbox --
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_EXECUTION_API_KEY: ${DIFY_SANDBOX_API_KEY}
      # -- SSRF proxy (outbound HTTP for agents/tools) --
      SSRF_PROXY_HTTP_URL: http://dify-ssrf-proxy:3128
      SSRF_PROXY_HTTPS_URL: http://dify-ssrf-proxy:3128
      # -- Plugin daemon --
      PLUGIN_DAEMON_URL: http://dify-plugin-daemon:5002
      PLUGIN_DAEMON_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      PLUGIN_DIFY_INNER_API_URL: http://dify-api:5001
      PLUGIN_DIFY_INNER_API_KEY: ${DIFY_PLUGIN_DIFY_INNER_API_KEY}
      # -- Storage (local filesystem) --
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: storage
      # OpenTelemetry (Metrics push)
      ENABLE_OTEL: "true"
      OTEL_EXPORTER_TYPE: "otlp"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http"
      OTLP_BASE_ENDPOINT: "http://otel-collector:4318"
    volumes:
      - dify-api-storage:/app/api/storage
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    logging: *default-logging
    networks:
      - chat-network

  dify-worker:
    image: langgenius/dify-api:1.13.3
    container_name: nexaduo-dify-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dify-sandbox:
        condition: service_started
      dify-ssrf-proxy:
        condition: service_started
    environment:
      MODE: worker
      LOG_LEVEL: ${DIFY_LOG_LEVEL:-INFO}
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${POSTGRES_HOST:-postgres}
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_DATABASE: dify
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USE_SSL: "false"
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      VECTOR_STORE: ${DIFY_VECTOR_STORE:-pgvector}
      PGVECTOR_HOST: ${POSTGRES_HOST:-postgres}
      PGVECTOR_PORT: ${POSTGRES_PORT:-5432}
      PGVECTOR_USER: ${POSTGRES_USER}
      PGVECTOR_PASSWORD: ${POSTGRES_PASSWORD}
      PGVECTOR_DATABASE: dify
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_EXECUTION_API_KEY: ${DIFY_SANDBOX_API_KEY}
      SSRF_PROXY_HTTP_URL: http://dify-ssrf-proxy:3128
      SSRF_PROXY_HTTPS_URL: http://dify-ssrf-proxy:3128
      PLUGIN_DAEMON_URL: http://dify-plugin-daemon:5002
      PLUGIN_DAEMON_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      PLUGIN_DIFY_INNER_API_URL: http://dify-api:5001
      PLUGIN_DIFY_INNER_API_KEY: ${DIFY_PLUGIN_DIFY_INNER_API_KEY}
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: storage
      # OpenTelemetry (Metrics push)
      ENABLE_OTEL: "true"
      OTEL_EXPORTER_TYPE: "otlp"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http"
      OTLP_BASE_ENDPOINT: "http://otel-collector:4318"
    volumes:
      - dify-api-storage:/app/api/storage
    logging: *default-logging
    networks:
      - chat-network

  dify-web:
    image: langgenius/dify-web:1.13.3
    container_name: nexaduo-dify-web
    restart: unless-stopped
    depends_on:
      dify-api:
        condition: service_started
    environment:
      CONSOLE_API_URL: ${DIFY_CONSOLE_API_URL}
      APP_API_URL: ${DIFY_APP_API_URL}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3001:3000"
    logging: *default-logging
    networks:
      - chat-network

  dify-sandbox:
    image: langgenius/dify-sandbox:0.2.14
    container_name: nexaduo-dify-sandbox
    restart: unless-stopped
    environment:
      API_KEY: ${DIFY_SANDBOX_API_KEY}
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://dify-ssrf-proxy:3128
      HTTPS_PROXY: http://dify-ssrf-proxy:3128
      SANDBOX_PORT: 8194
    volumes:
      - dify-sandbox-deps:/dependencies
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8194/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - chat-network

  dify-plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    container_name: nexaduo-dify-plugin-daemon
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: ${POSTGRES_HOST:-postgres}
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: dify_plugin
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SERVER_PORT: 5002
      SERVER_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      MAX_PLUGIN_PACKAGE_SIZE: 52428800
      PPROF_ENABLED: "false"
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: ${DIFY_PLUGIN_DIFY_INNER_API_KEY}
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
      FORCE_VERIFYING_SIGNATURE: "true"
      PYTHON_ENV_INIT_TIMEOUT: 120
      PLUGIN_MAX_EXECUTION_TIMEOUT: 600
    volumes:
      - dify-plugin-daemon-storage:/app/storage
    logging: *default-logging
    networks:
      - chat-network

  dify-ssrf-proxy:
    image: ubuntu/squid:latest
    container_name: nexaduo-dify-ssrf-proxy
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    logging: *default-logging
    networks:
      - chat-network

  # ===========================================================================
  # Middleware — Chatwoot ⇄ Dify adapter (Node.js/TypeScript)
  # ===========================================================================
  middleware:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    image: nexaduo/middleware:dev
    container_name: nexaduo-middleware
    restart: unless-stopped
    depends_on:
      chatwoot-rails:
        condition: service_started
      dify-api:
        condition: service_started
    env_file: .env
    environment:
      PORT: ${MIDDLEWARE_PORT:-4000}
      LOG_LEVEL: ${MIDDLEWARE_LOG_LEVEL:-info}
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL:-http://chatwoot-rails:3000}
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN}
      DIFY_BASE_URL: ${DIFY_BASE_URL:-http://dify-api:5001/v1}
      DIFY_REQUEST_TIMEOUT_MS: ${DIFY_REQUEST_TIMEOUT_MS:-30000}
      TENANT_MAP: ${TENANT_MAP:-{}}
      HANDOFF_SHARED_SECRET: ${HANDOFF_SHARED_SECRET}
      HANDOFF_LABEL: ${HANDOFF_LABEL:-atendimento-humano}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/middleware
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      chat-network:
        aliases:
          - middleware.local

  # ===========================================================================
  # Observability — Prometheus + Grafana + Loki (provisioned)
  # ===========================================================================
  loki:
    image: grafana/loki:3.2.0
    container_name: nexaduo-loki
    user: "0:0"
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/var/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - chat-network

  promtail:
    image: grafana/promtail:3.1.0
    container_name: nexaduo-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yaml
    volumes:
      - ./observability/promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging: *default-logging
    networks:
      - chat-network

  self-healing-agent:
    build:
      context: ./agents/self-healing
      dockerfile: Dockerfile
    container_name: nexaduo-self-healing-agent
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/self_healing
      LOKI_URL: http://loki:3100
      DIFY_API_URL: http://dify-api:5001/v1
      POLL_INTERVAL_MS: 300000
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-nexaduo}
      HANDOFF_SHARED_SECRET: ${HANDOFF_SHARED_SECRET}
      MIDDLEWARE_URL: http://middleware:4000
    logging: *default-logging
    networks:
      - chat-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: nexaduo-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - chat-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: nexaduo-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    logging: *default-logging
    networks:
      - chat-network

  grafana:
    image: grafana/grafana:11.3.0
    container_name: nexaduo-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3002:3000"
    logging: *default-logging
    networks:
      - chat-network

