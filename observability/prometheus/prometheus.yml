# =============================================================================
# Prometheus — NexaDuo chat-services
# Scrapes metrics exposed by:
#   - middleware      (Fastify + prom-client, /metrics)
#   - dify-api        (via otel-collector:8889)
#
# Extend with exporters for:
#   - redis        → redis_exporter (future)
#   - postgres     → postgres_exporter (future)
#   - chatwoot     → via prometheus-client gem (future)
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: nexaduo

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: middleware
    metrics_path: /metrics
    static_configs:
      - targets: [middleware:4000]
        labels:
          service: middleware

  - job_name: dify-api
    metrics_path: /metrics
    static_configs:
      - targets: [otel-collector:8889]
        labels:
          service: dify-api
    # Dify pushes to OTel Collector, which exposes /metrics on port 8889.
    # Enable via ENABLE_OTEL=true in Dify env.
