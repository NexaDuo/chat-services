auth_enabled: false

server:
  # Run the query path at `warn` so Loki stops emitting a per-query INFO
  # `caller=metrics.go ... status=500` line for EVERY query (issue #21).
  # That 500 is a cosmetic upstream Loki 3.2.0 artifact: the querier records
  # the internal gRPC context-cancellation that happens at the normal end of
  # each streamed sub-query as `status=500`, while the query-frontend
  # (`component=frontend`) returns HTTP 200 with the full result set to the
  # caller. Proven two ways: (a) 12h of prod logs show 116/116 frontend
  # queries = status=200 and zero client-facing 500s; (b) a clean stock
  # `grafana/loki:3.2.0` reproduces the querier `status=500` for ANY query
  # (even a zero-match filter), independent of limits/schema/sharding — so no
  # `limits_config`/schema/chunk-permission change addresses it. The
  # self-healing agent therefore always receives 200 and collects logs fine;
  # the only real problem was log noise (and those lines embed the words
  # "error/fatal/..." from the query string, so the self-healing agent's own
  # error-regex scan re-ingested them as false positives). `warn` keeps
  # genuine warnings/errors (e.g. poller.go index errors) and real operational
  # metrics still come from Prometheus (/metrics), not these INFO log lines.
  log_level: warn
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /var/loki
  storage:
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h
  reject_old_samples: true
  reject_old_samples_max_age: 336h
  max_cache_freshness_per_query: 10m
  split_queries_by_interval: 15m
  allow_structured_metadata: true

ingester:
  lifecycler:
    join_after: 0s
    min_ready_duration: 0s
    final_sleep: 0s
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  chunk_idle_period: 1m
  chunk_retain_period: 30s

table_manager:
  retention_deletes_enabled: true
  retention_period: 720h

analytics:
  reporting_enabled: false
