# Traefik file-provider routes for the local run.
#
# We use the file provider (not the docker provider) because Docker Desktop on
# WSL rejects Traefik's Docker API calls ("Error response from daemon:"). These
# routes mirror the traefik.* labels on the service containers 1:1, including
# Dify's path-based split (api vs web). Hostnames are the production domains
# (BASE_DOMAIN=nexaduo.com) served via the Cloudflare Tunnel -> coolify-proxy.
http:
  routers:
    chatwoot:
      rule: "Host(`chat.nexaduo.com`)"
      entryPoints: [http]
      service: chatwoot
    dify-api:
      rule: "Host(`dify.nexaduo.com`) && (PathPrefix(`/v1`) || PathPrefix(`/console/api`) || PathPrefix(`/files`))"
      entryPoints: [http]
      priority: 20
      service: dify-api
    dify-web:
      rule: "Host(`dify.nexaduo.com`)"
      entryPoints: [http]
      priority: 10
      service: dify-web
    evolution:
      rule: "Host(`evolution.nexaduo.com`)"
      entryPoints: [http]
      service: evolution
    middleware:
      rule: "Host(`middleware.nexaduo.com`)"
      entryPoints: [http]
      service: middleware
    grafana:
      rule: "Host(`grafana.nexaduo.com`)"
      entryPoints: [http]
      service: grafana
  services:
    chatwoot:
      loadBalancer:
        servers:
          - url: "http://chatwoot-rails:3000"
    dify-api:
      loadBalancer:
        servers:
          - url: "http://dify-api:5001"
    dify-web:
      loadBalancer:
        servers:
          - url: "http://dify-web:3000"
    evolution:
      loadBalancer:
        servers:
          - url: "http://evolution-api:8080"
    middleware:
      loadBalancer:
        servers:
          - url: "http://middleware:4000"
    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"
