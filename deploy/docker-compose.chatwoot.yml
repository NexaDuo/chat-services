services:
  chatwoot-init:
    image: chatwoot/chatwoot:v4.13.0-ce
    restart: "no"
    environment:
      RAILS_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "==> Running db:prepare (idempotent)";
        bundle exec rails db:prepare;
        echo "==> Chatwoot DB ready.";
    networks:
      - chat-network
  chatwoot-rails:
    image: chatwoot/chatwoot:v4.13.0-ce
    restart: unless-stopped
    depends_on:
      chatwoot-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: https://chat.nexaduo.com
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CHATWOOT_FORCE_SSL: "false"
      FORCE_SSL: "false"
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_CALLBACK_URL: https://chat.nexaduo.com/omniauth/google_oauth2/callback
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chatwoot.rule=Host(`chat.nexaduo.com`)"
      - "traefik.http.routers.chatwoot.entrypoints=http"
      - "traefik.http.services.chatwoot.loadbalancer.server.port=3000"
    volumes:
      - chatwoot-storage:/app/storage
      - chatwoot-public:/app/public
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - chat-network
  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v4.13.0-ce
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - chatwoot-storage:/app/storage
      - chatwoot-public:/app/public
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    networks:
      - chat-network
volumes:
  chatwoot-storage:
  chatwoot-public:
networks:
  chat-network:
    external: true
    name: nexaduo-network
