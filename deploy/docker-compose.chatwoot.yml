services:
  chatwoot-init:
    image: chatwoot/chatwoot:v4.13.0-ce
    restart: "no"
    environment:
      RAILS_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
    volumes:
      # DIRECTORY mount (not single-file) — WSL stale-inode hardening (issue #138).
      # Single-file bind mounts break on inode swap after a WSL/host reboot (the
      # source can even flip to an empty directory), which made chatwoot exit 127
      # and postgres skip its init on reboot. We mount the whole initializers dir
      # to a scratch path and copy the .rb files into config/initializers at start,
      # so the container always reads the current file content on (re)start.
      - ${NEXADUO_CONF_PATH}/deploy/chatwoot-initializers:/nexaduo-initializers:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "==> Loading versioned initializers";
        cp /nexaduo-initializers/*.rb config/initializers/ 2>/dev/null || true;
        echo "==> Running db:prepare (idempotent)";
        bundle exec rails db:prepare;
        echo "==> Clearing onboarding if admin exists";
        bundle exec rails r "Redis::Alfred.delete(Redis::Alfred::CHATWOOT_INSTALLATION_ONBOARDING) if User.where(type: 'SuperAdmin').exists?";
        echo "==> Chatwoot DB ready.";
    networks:
      - chat-network
  chatwoot-rails:
    image: chatwoot/chatwoot:v4.13.0-ce
    restart: unless-stopped
    depends_on:
      chatwoot-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL}
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CHATWOOT_FORCE_SSL: "false"
      FORCE_SSL: "false"
      # Trust the tunnel/Traefik forwarded https scheme so request.base_url is
      # https and the /super_admin CSRF Origin check passes (issue #95). This is
      # assume_ssl (no redirect), NOT force_ssl — no Cloudflare SSL redirect loop.
      RAILS_ASSUME_SSL: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_CALLBACK_URL: ${GOOGLE_OAUTH_CALLBACK_URL}
      OMNIAUTH_PROVIDERS: google_oauth2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chatwoot.rule=Host(`${CHATWOOT_DOMAIN}`)"
      - "traefik.http.routers.chatwoot.entrypoints=http"
      - "traefik.http.services.chatwoot.loadbalancer.server.port=3000"
    volumes:
      - chatwoot-storage:/app/storage
      - chatwoot-public:/app/public
      # DIRECTORY mount (not single-file) — WSL stale-inode hardening (issue #138).
      # See chatwoot-init above. Copied into config/initializers at start.
      - ${NEXADUO_CONF_PATH}/deploy/chatwoot-initializers:/nexaduo-initializers:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cp /nexaduo-initializers/*.rb config/initializers/ 2>/dev/null || true
        echo "OmniAuth.config.allowed_request_methods = [:post, :get]" >> config/initializers/omniauth.rb
        exec docker/entrypoints/rails.sh bundle exec rails s -p 3000 -b 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - chat-network
  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v4.13.0-ce
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      # FRONTEND_URL must be present in the Sidekiq process too: background
      # jobs (SendReplyJob, AutoAssignment::AssignmentJob, Devise::Mailer, ...)
      # build absolute URLs with no HTTP request context, so Rails derives
      # default_url_options[:host] / the ActionMailer host from FRONTEND_URL.
      # Without it Sidekiq raises "Missing host to link to!" (issue #83).
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL}
      CHATWOOT_FORCE_SSL: "false"
      FORCE_SSL: "false"
      # Kept in parity with chatwoot-rails (issue #95); harmless in Sidekiq (no
      # rack requests) — background jobs derive https from FRONTEND_URL.
      RAILS_ASSUME_SSL: "true"
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - chatwoot-storage:/app/storage
      - chatwoot-public:/app/public
      # DIRECTORY mount (not single-file) — WSL stale-inode hardening (issue #138).
      # See chatwoot-init above. Copied into config/initializers at start.
      - ${NEXADUO_CONF_PATH}/deploy/chatwoot-initializers:/nexaduo-initializers:ro
    # Shell entrypoint so we can copy the versioned initializers before Sidekiq
    # boots, then hand off to the image's rails.sh entrypoint (parity with
    # chatwoot-rails; the image's default entrypoint is docker/entrypoints/rails.sh).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cp /nexaduo-initializers/*.rb config/initializers/ 2>/dev/null || true
        exec docker/entrypoints/rails.sh bundle exec sidekiq -C config/sidekiq.yml
    networks:
      - chat-network
volumes:
  chatwoot-storage:
  chatwoot-public:
networks:
  chat-network:
    external: true
    name: nexaduo-network
