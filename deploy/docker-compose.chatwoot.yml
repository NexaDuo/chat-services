services:
  chatwoot-init:
    image: chatwoot/chatwoot:v4.13.0-ce
    restart: "no"
    environment:
      RAILS_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
    volumes:
      - ${NEXADUO_CONF_PATH}/deploy/ai_agents.rb:/app/config/initializers/ai_agents.rb:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "==> Running db:prepare (idempotent)";
        bundle exec rails db:prepare;
        echo "==> Clearing onboarding if admin exists";
        bundle exec rails r "Redis::Alfred.delete(Redis::Alfred::CHATWOOT_INSTALLATION_ONBOARDING) if User.where(type: 'SuperAdmin').exists?";
        echo "==> Chatwoot DB ready.";
    networks:
      - chat-network
  chatwoot-rails:
    image: chatwoot/chatwoot:v4.13.0-ce
    restart: unless-stopped
    depends_on:
      chatwoot-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL}
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CHATWOOT_FORCE_SSL: "false"
      FORCE_SSL: "false"
      GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      # Chatwoot's omniauth.rb reads ENV['GOOGLE_OAUTH_CLIENT_ID'/'..._SECRET']
      # directly (not GOOGLE_CLIENT_ID). Without these exact names the Google
      # login button builds an OAuth URL with an empty client_id and fails.
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_CALLBACK_URL: ${GOOGLE_OAUTH_CALLBACK_URL}
      OMNIAUTH_PROVIDERS: google_oauth2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chatwoot.rule=Host(`${CHATWOOT_DOMAIN}`)"
      - "traefik.http.routers.chatwoot.entrypoints=http"
      - "traefik.http.services.chatwoot.loadbalancer.server.port=3000"
    volumes:
      - chatwoot-storage:/app/storage
      - chatwoot-public:/app/public
      - ${NEXADUO_CONF_PATH}/deploy/ai_agents.rb:/app/config/initializers/ai_agents.rb:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "OmniAuth.config.allowed_request_methods = [:post, :get]" >> config/initializers/omniauth.rb
        exec docker/entrypoints/rails.sh bundle exec rails s -p 3000 -b 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - chat-network
  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v4.13.0-ce
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      # Sidekiq jobs (e.g. Webhooks::InstagramEventsJob) build absolute URLs and
      # throw "Missing host to link to!" without FRONTEND_URL — which intermittently
      # broke inbound Instagram processing / the message_created webhook. Must match
      # chatwoot-rails.
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL}
      CHATWOOT_FORCE_SSL: "false"
      FORCE_SSL: "false"
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - chatwoot-storage:/app/storage
      - chatwoot-public:/app/public
      - ${NEXADUO_CONF_PATH}/deploy/ai_agents.rb:/app/config/initializers/ai_agents.rb:ro
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    networks:
      - chat-network
volumes:
  chatwoot-storage:
  chatwoot-public:
networks:
  chat-network:
    external: true
    name: nexaduo-network
