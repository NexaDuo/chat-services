services:
  dify-init:
    image: alpine:3.19
    container_name: nexaduo-dify-init
    restart: "no"
    volumes:
      - dify-api-storage:/app/api/storage
    command: chown -R 1001:1001 /app/api/storage
    networks:
      - chat-network
  dify-api:
    image: langgenius/dify-api:1.13.3
    container_name: nexaduo-dify-api
    restart: unless-stopped
    depends_on:
      dify-init:
        condition: service_completed_successfully
      dify-sandbox:
        condition: service_started
      dify-plugin-daemon:
        condition: service_started
      dify-ssrf-proxy:
        condition: service_started
    environment:
      MODE: api
      MIGRATION_ENABLED: "true"
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${POSTGRES_HOST:-postgres}
      DB_DATABASE: dify
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      VECTOR_STORE: pgvector
      PGVECTOR_HOST: ${POSTGRES_HOST:-postgres}
      PGVECTOR_USER: ${POSTGRES_USER}
      PGVECTOR_PASSWORD: ${POSTGRES_PASSWORD}
      PGVECTOR_DATABASE: dify
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_EXECUTION_API_KEY: ${DIFY_SANDBOX_API_KEY}
      PLUGIN_DAEMON_URL: http://dify-plugin-daemon:5002
      PLUGIN_DAEMON_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      WEB_API_CORS_ALLOW_ORIGINS: "${DIFY_CORS_ALLOW_ORIGINS:-*}"
      CONSOLE_CORS_ALLOW_ORIGINS: "${DIFY_CORS_ALLOW_ORIGINS:-*}"
      ENABLE_SOCIAL_OAUTH_LOGIN: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
    volumes:
      - dify-api-storage:/app/api/storage
    ports:
      - "5001:5001"
    networks:
      - chat-network
  dify-worker:
    image: langgenius/dify-api:1.13.3
    container_name: nexaduo-dify-worker
    restart: unless-stopped
    environment:
      MODE: worker
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${POSTGRES_HOST:-postgres}
      DB_DATABASE: dify
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - dify-api-storage:/app/api/storage
    networks:
      - chat-network
  dify-web:
    image: langgenius/dify-web:1.13.3
    container_name: nexaduo-dify-web
    restart: unless-stopped
    environment:
      CONSOLE_API_URL: ${DIFY_CONSOLE_API_URL:-http://localhost:5001}
      APP_API_URL: ${DIFY_APP_API_URL:-http://localhost:5001}
    ports:
      - "3001:3000"
    networks:
      - chat-network
  dify-sandbox:
    image: langgenius/dify-sandbox:0.2.14
    container_name: nexaduo-dify-sandbox
    restart: unless-stopped
    environment:
      API_KEY: ${DIFY_SANDBOX_API_KEY}
    networks:
      - chat-network
  dify-plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    container_name: nexaduo-dify-plugin-daemon
    restart: unless-stopped
    environment:
      SERVER_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: ${DIFY_PLUGIN_DIFY_INNER_API_KEY}
      PLUGIN_REMOTE_INSTALLING_HOST: "0.0.0.0"
      PLUGIN_REMOTE_INSTALLING_PORT: "5003"
      PLUGIN_WORKING_PATH: /app/storage/cwd
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      FORCE_VERIFYING_SIGNATURE: "true"
      DB_HOST: ${POSTGRES_HOST:-postgres}
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: dify_plugin
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - dify-plugin-storage:/app/storage
    networks:
      - chat-network
  dify-ssrf-proxy:
    image: ubuntu/squid:latest
    container_name: nexaduo-dify-ssrf-proxy
    restart: unless-stopped
    networks:
      - chat-network
volumes:
  dify-api-storage:
  dify-plugin-storage:
networks:
  chat-network:
    external: true
    name: nexaduo-network
