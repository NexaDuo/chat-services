services:
  dify-init:
    image: alpine:3.19
    restart: "no"
    volumes:
      - dify-api-storage:/app/api/storage
    command: chown -R 1001:1001 /app/api/storage
    networks:
      - chat-network
  dify-api:
    image: langgenius/dify-api:1.13.3
    restart: unless-stopped
    depends_on:
      dify-init:
        condition: service_completed_successfully
      dify-sandbox:
        condition: service_started
      dify-plugin-daemon:
        condition: service_started
      dify-ssrf-proxy:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dify-api.rule=Host(`dify.nexaduo.com`) && (PathPrefix(`/v1`) || PathPrefix(`/console/api`) || PathPrefix(`/files`))"
      - "traefik.http.routers.dify-api.entrypoints=http"
      - "traefik.http.routers.dify-api.priority=20"
      - "traefik.http.services.dify-api.loadbalancer.server.port=5001"
    environment:
      MODE: api
      MIGRATION_ENABLED: "true"
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      VECTOR_STORE: pgvector
      PGVECTOR_HOST: postgres
      PGVECTOR_USER: postgres
      PGVECTOR_PASSWORD: ${POSTGRES_PASSWORD}
      PGVECTOR_DATABASE: dify
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_EXECUTION_API_KEY: ${DIFY_SANDBOX_API_KEY}
      PLUGIN_DAEMON_URL: http://dify-plugin-daemon:5002
      PLUGIN_DAEMON_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      ENABLE_SOCIAL_OAUTH_LOGIN: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CONSOLE_API_URL: https://dify.nexaduo.com
      CONSOLE_WEB_URL: https://dify.nexaduo.com
      SERVICE_API_URL: https://dify.nexaduo.com
      APP_API_URL: https://dify.nexaduo.com
      APP_WEB_URL: https://dify.nexaduo.com
      CONSOLE_OAUTH_REGISTRATION_ENABLED: "true"
      DIFY_LOG_LEVEL: INFO
      TRUSTED_PROXIES: "*"
    volumes:
      - dify-api-storage:/app/api/storage
    networks:
      - chat-network
  dify-worker:
    image: langgenius/dify-api:1.13.3
    restart: unless-stopped
    environment:
      MODE: worker
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - dify-api-storage:/app/api/storage
    networks:
      - chat-network
  dify-web:
    image: langgenius/dify-web:1.13.3
    restart: unless-stopped
    environment:
      CONSOLE_API_URL: https://dify.nexaduo.com
      APP_API_URL: https://dify.nexaduo.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dify.rule=Host(`dify.nexaduo.com`)"
      - "traefik.http.routers.dify.entrypoints=http"
      - "traefik.http.routers.dify.priority=10"
      - "traefik.http.services.dify.loadbalancer.server.port=3000"
    networks:
      - chat-network
  dify-sandbox:
    image: langgenius/dify-sandbox:0.2.14
    restart: unless-stopped
    environment:
      API_KEY: ${DIFY_SANDBOX_API_KEY}
    networks:
      - chat-network
  dify-plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    restart: unless-stopped
    environment:
      SERVER_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: '${DIFY_PLUGIN_DIFY_INNER_API_KEY}'
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: dify_plugin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PLUGIN_REMOTE_INSTALLING_HOST: "0.0.0.0"
      PLUGIN_REMOTE_INSTALLING_PORT: "5003"
      PLUGIN_WORKING_PATH: /app/storage/cwd
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
    volumes:
      - dify-plugin-storage:/app/storage
    networks:
      - chat-network
  dify-ssrf-proxy:
    image: ubuntu/squid:latest
    restart: unless-stopped
    networks:
      - chat-network
volumes:
  dify-api-storage:
  dify-plugin-storage:
networks:
  chat-network:
    external: true
    name: nexaduo-network
