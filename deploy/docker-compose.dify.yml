# Dify Service Stack - Dynamic Environment Configurations
services:
  dify-init:
    image: alpine:3.19
    restart: "no"
    volumes:
      - dify-api-storage:/app/api/storage
    command: chown -R 1001:1001 /app/api/storage
    networks:
      - chat-network
  dify-api:
    image: langgenius/dify-api:1.13.3
    restart: unless-stopped
    # Healthcheck for issue #41: after a redeploy/recreate the gunicorn master
    # sometimes binds :5001 but no workers boot ("Booting worker" never appears),
    # so the port accepts TCP but every request hangs (0 bytes -> edge 502).
    # /health is a Flask route SERVED BY A WORKER (returns {"pid","status","version"}),
    # so it fails exactly in the worker-less state — unlike a bare TCP probe.
    # NOTE: plain Compose `restart:` does NOT act on health status; the `autoheal`
    # sidecar in docker-compose.shared.yml watches `autoheal=true` containers and
    # restarts them when they go `unhealthy`, which recycles the worker-less master.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "8", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Generous cold-start grace: Dify runs Alembic migrations + gunicorn/gevent
      # boot on start. During start_period a failing probe does not mark unhealthy.
      start_period: 180s
    depends_on:
      dify-init:
        condition: service_completed_successfully
      dify-sandbox:
        condition: service_started
      dify-plugin-daemon:
        condition: service_started
      dify-ssrf-proxy:
        condition: service_started
    labels:
      # Recycled by the autoheal sidecar (docker-compose.shared.yml) when the
      # healthcheck below reports `unhealthy` — the #41 worker-less-master fix.
      - "autoheal=true"
      - "traefik.enable=true"
      - "traefik.http.routers.dify-api.rule=Host(`${DIFY_DOMAIN}`) && (PathPrefix(`/v1`) || PathPrefix(`/console/api`) || PathPrefix(`/files`))"
      - "traefik.http.routers.dify-api.entrypoints=http"
      - "traefik.http.routers.dify-api.priority=20"
      - "traefik.http.services.dify-api.loadbalancer.server.port=5001"
    environment:
      MODE: api
      MIGRATION_ENABLED: "true"
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      VECTOR_STORE: pgvector
      PGVECTOR_HOST: postgres
      PGVECTOR_USER: postgres
      PGVECTOR_PASSWORD: ${POSTGRES_PASSWORD}
      PGVECTOR_DATABASE: dify
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_EXECUTION_API_KEY: ${DIFY_SANDBOX_API_KEY}
      PLUGIN_DAEMON_URL: http://dify-plugin-daemon:5002
      PLUGIN_DAEMON_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      ENABLE_SOCIAL_OAUTH_LOGIN: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CONSOLE_API_URL: ${DIFY_CONSOLE_API_URL}
      CONSOLE_WEB_URL: ${DIFY_CONSOLE_API_URL}
      SERVICE_API_URL: ${DIFY_CONSOLE_API_URL}
      APP_API_URL: ${DIFY_APP_API_URL}
      APP_WEB_URL: ${DIFY_APP_API_URL}
      CONSOLE_OAUTH_REGISTRATION_ENABLED: "true"
      DIFY_LOG_LEVEL: INFO
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      DIFY_API_ENABLE_METRICS: ${DIFY_API_ENABLE_METRICS:-false}
      INNER_API_METRICS_ENABLED: ${INNER_API_METRICS_ENABLED:-false}
      TRUSTED_PROXIES: "*"
      SERVER_WORKER_AMOUNT: "1"
    volumes:
      - dify-api-storage:/app/api/storage
    networks:
      - chat-network
  dify-worker:
    image: langgenius/dify-api:1.13.3
    restart: unless-stopped
    environment:
      MODE: worker
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - dify-api-storage:/app/api/storage
    networks:
      - chat-network
  dify-web:
    image: langgenius/dify-web:1.13.3
    restart: unless-stopped
    environment:
      CONSOLE_API_URL: ${DIFY_CONSOLE_API_URL}
      APP_API_URL: ${DIFY_APP_API_URL}
      NEXT_PUBLIC_COOKIE_DOMAIN: ${NEXT_PUBLIC_COOKIE_DOMAIN:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dify.rule=Host(`${DIFY_DOMAIN}`)"
      - "traefik.http.routers.dify.entrypoints=http"
      - "traefik.http.routers.dify.priority=10"
      - "traefik.http.services.dify.loadbalancer.server.port=3000"
    networks:
      - chat-network
  dify-sandbox:
    image: langgenius/dify-sandbox:0.2.14
    restart: unless-stopped
    environment:
      API_KEY: ${DIFY_SANDBOX_API_KEY}
    networks:
      - chat-network
  dify-plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    restart: unless-stopped
    environment:
      SERVER_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: '${DIFY_PLUGIN_DIFY_INNER_API_KEY}'
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: dify_plugin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PLUGIN_REMOTE_INSTALLING_HOST: "0.0.0.0"
      PLUGIN_REMOTE_INSTALLING_PORT: "5003"
      PLUGIN_WORKING_PATH: /app/storage/cwd
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
    volumes:
      - dify-plugin-storage:/app/storage
    networks:
      - chat-network
  dify-ssrf-proxy:
    image: ubuntu/squid:latest
    restart: unless-stopped
    networks:
      - chat-network
volumes:
  dify-api-storage:
  dify-plugin-storage:
networks:
  chat-network:
    external: true
    name: nexaduo-network
