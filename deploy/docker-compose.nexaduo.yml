services:
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: nexaduo-evolution-api
    restart: unless-stopped
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_AUTHENTICATION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - evolution-instances:/evolution/instances
    ports:
      - "8082:8080"
    networks:
      - chat-network
  middleware:
    image: ${MIDDLEWARE_IMAGE}
    container_name: nexaduo-middleware
    restart: unless-stopped
    environment:
      PORT: 4000
      CHATWOOT_BASE_URL: http://chatwoot-rails:3000
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN}
      CHATWOOT_WEBHOOK_TOKEN: ${CHATWOOT_WEBHOOK_TOKEN}
      DIFY_BASE_URL: http://dify-api:5001/v1
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/middleware
      HANDOFF_SHARED_SECRET: ${HANDOFF_SHARED_SECRET}
    ports:
      - "4000:4000"
    networks:
      - chat-network
  # Observability & Self-healing
  loki:
    image: grafana/loki:3.2.0
    container_name: nexaduo-loki
    restart: unless-stopped
    user: "0"
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ${NEXADUO_CONF_PATH:-..}/observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/var/loki
    networks:
      - chat-network
  promtail:
    image: grafana/promtail:3.1.0
    container_name: nexaduo-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yaml
    volumes:
      - ${NEXADUO_CONF_PATH:-..}/observability/promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - chat-network
  grafana:
    image: grafana/grafana:11.3.0
    container_name: nexaduo-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_GOOGLE_ENABLED: "true"
      GF_AUTH_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GF_AUTH_GOOGLE_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GF_AUTH_GOOGLE_SCOPES: "openid email profile"
      GF_AUTH_GOOGLE_AUTH_URL: "https://accounts.google.com/o/oauth2/v2/auth"
      GF_AUTH_GOOGLE_TOKEN_URL: "https://oauth2.googleapis.com/token"
      GF_AUTH_GOOGLE_ALLOWED_DOMAINS: "nexaduo.com machado.cc"
      GF_SERVER_ROOT_URL: "https://grafana.nexaduo.com"
    volumes:
      - ${NEXADUO_CONF_PATH:-..}/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3002:3000"
    networks:
      - chat-network
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: nexaduo-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    volumes:
      - ${NEXADUO_CONF_PATH:-..}/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - chat-network
  self-healing-agent:
    image: ${SELF_HEALING_IMAGE}
    container_name: nexaduo-self-healing-agent
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/self_healing
      LOKI_URL: http://loki:3100
      MIDDLEWARE_URL: http://middleware:4000
    networks:
      - chat-network
volumes:
  evolution-instances:
  loki-data:
  grafana-data:
  prometheus-data:
networks:
  chat-network:
    external: true
    name: nexaduo-network
