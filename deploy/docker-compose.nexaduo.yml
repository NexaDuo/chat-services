services:
  evolution-api:
    # Evolution API's official image moved to evoapicloud/* — atendai/evolution-api
    # now denies pulls and broke CI/redeploys. Same pinned version (v2.1.1).
    image: evoapicloud/evolution-api:v2.1.1
    restart: unless-stopped
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      AUTHENTICATION_API_KEY: '${EVOLUTION_API_KEY}'
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: 'postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evolution'
      CACHE_REDIS_URI: 'redis://:${REDIS_PASSWORD}@redis:6379/2'
    volumes:
      - 'evolution-instances:/evolution/instances'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evolution.rule=Host(`${EVOLUTION_DOMAIN}`)"
      - "traefik.http.routers.evolution.entrypoints=http"
      - "traefik.http.services.evolution.loadbalancer.server.port=8080"
    networks:
      - chat-network
  middleware:
    image: '${MIDDLEWARE_IMAGE}'
    restart: unless-stopped
    environment:
      PORT: 4000
      CHATWOOT_BASE_URL: http://chatwoot-rails:3000
      CHATWOOT_API_TOKEN: '${CHATWOOT_API_TOKEN}'
      CHATWOOT_WEBHOOK_TOKEN: '${CHATWOOT_WEBHOOK_TOKEN}'
      DIFY_BASE_URL: http://dify-api:5001/v1
      DATABASE_URL: 'postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/middleware'
      HANDOFF_SHARED_SECRET: '${HANDOFF_SHARED_SECRET}'
      ADMIN_PASSWORD: '${ADMIN_PASSWORD}'
      CHATWOOT_PLATFORM_TOKEN: '${CHATWOOT_PLATFORM_TOKEN}'
      EVOLUTION_AUTHENTICATION_API_KEY: '${EVOLUTION_API_KEY}'
      EVOLUTION_BASE_URL: http://evolution-api:8080
      # Pin the OTLP endpoint so traces/metrics reach the collector instead of
      # defaulting to localhost:4318 (was spamming ECONNREFUSED — self-healing #43).
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      # The collector has no logs pipeline (logs go to Loki via Promtail), so the
      # auto-enabled OTLP logs exporter 404s on /v1/logs. Disable just that signal.
      OTEL_LOGS_EXPORTER: none
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.middleware.rule=Host(`${MIDDLEWARE_DOMAIN}`)"
      - "traefik.http.routers.middleware.entrypoints=http"
      - "traefik.http.services.middleware.loadbalancer.server.port=4000"
    networks:
      - chat-network
  loki:
    image: grafana/loki:3.2.0
    restart: unless-stopped
    user: "0"
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ${NEXADUO_CONF_PATH}/observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/var/loki
    networks:
      - chat-network
  promtail:
    image: grafana/promtail:3.1.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yaml
    volumes:
      - ${NEXADUO_CONF_PATH}/observability/promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-data:/var/promtail
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - chat-network
  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: '${GRAFANA_PASSWORD}'
      GF_AUTH_GOOGLE_ENABLED: "true"
      GF_AUTH_GOOGLE_CLIENT_ID: '${GOOGLE_ID}'
      GF_AUTH_GOOGLE_CLIENT_SECRET: '${GOOGLE_SECRET}'
      GF_AUTH_GOOGLE_SCOPES: "openid email profile"
      GF_AUTH_GOOGLE_AUTH_URL: "https://accounts.google.com/o/oauth2/v2/auth"
      GF_AUTH_GOOGLE_TOKEN_URL: "https://oauth2.googleapis.com/token"
      GF_AUTH_GOOGLE_ALLOWED_DOMAINS: "nexaduo.com machado.cc"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: postgres
      GF_DATABASE_PASSWORD: '${POSTGRES_PASSWORD}'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=http"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    volumes:
      - ${NEXADUO_CONF_PATH}/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - chat-network
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    volumes:
      - ${NEXADUO_CONF_PATH}/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - chat-network
  self-healing-agent:
    image: '${SELF_HEALING_IMAGE}'
    restart: unless-stopped
    environment:
      DATABASE_URL: 'postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/self_healing'
      LOKI_URL: http://loki:3100
      MIDDLEWARE_URL: http://middleware:4000
      # Required to authenticate to the middleware /config API and pull the Dify
      # self-healing key — without it the agent runs detection-only (no analysis).
      HANDOFF_SHARED_SECRET: ${HANDOFF_SHARED_SECRET}
      # Pin the OTLP endpoint so traces reach the collector instead of defaulting
      # to localhost:4318 (which spammed ECONNREFUSED and fed the agent's own loop).
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      # No logs pipeline on the collector (Promtail handles logs) → /v1/logs 404s.
      OTEL_LOGS_EXPORTER: none
      # Loki streams are labelled with this project; must match Promtail's label.
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-nexaduo}
      # Action: open a deduped GitHub issue per severe insight. Optional — with no
      # token the agent just saves insights to its DB.
      GITHUB_TOKEN: ${SELF_HEALING_GITHUB_TOKEN:-}
      GITHUB_REPO: ${SELF_HEALING_GITHUB_REPO:-NexaDuo/chat-services}
      # Efficiency knobs (token budget): cap LLM calls/cycle, gate issues by severity.
      MAX_ANALYSES_PER_CYCLE: ${SELF_HEALING_MAX_ANALYSES:-10}
      ISSUE_MIN_SEVERITY: ${SELF_HEALING_ISSUE_MIN_SEVERITY:-error}
    networks:
      - chat-network
  otel-collector:
    # Single OTLP collector on chat-network: Node apps push traces here
    # (otel-collector:4318), Dify pushes OTLP metrics; metrics → Prometheus
    # scrape (:8889), traces → Tempo (:4317).
    image: otel/opentelemetry-collector-contrib:0.111.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ${NEXADUO_CONF_PATH}/observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - chat-network
  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    user: "0"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ${NEXADUO_CONF_PATH}/observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - chat-network
volumes:
  evolution-instances:
  loki-data:
  grafana-data:
  prometheus-data:
  promtail-data:
  tempo-data:
networks:
  chat-network:
    external: true
    name: nexaduo-network
