version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexaduo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      TZ: ${TZ:-UTC}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../infrastructure/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - chat-network

  redis:
    image: redis:7-alpine
    container_name: nexaduo-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass $${REDIS_PASSWORD}
      - --appendonly yes
      - --maxmemory-policy allkeys-lru
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - chat-network

volumes:
  postgres-data:
  redis-data:

networks:
  chat-network:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-nexaduo}-network
