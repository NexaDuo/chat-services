services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      TZ: ${TZ:-UTC}
      # Use a subdirectory of the mounted disk as PGDATA. Mounting the ext4
      # disk root directly fails initdb because of its lost+found directory.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /opt/nexaduo/postgres-data:/var/lib/postgresql/data
      # DIRECTORY mount (not single-file) — WSL stale-inode hardening (issue #138).
      # A single-file bind mount of 01-init.sql broke on inode swap after a reboot
      # (the host source even flipped to an empty directory), so mount the parent
      # dir; the postgres entrypoint runs every *.sql/*.sh in it on first init.
      # (In the run-stack.sh chain the docker-compose.yml override below wins with
      # the repo-relative infrastructure/postgres path.)
      - /opt/nexaduo/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - chat-network

  redis:
    image: redis:7.2.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - yes
      - --maxmemory-policy
      - allkeys-lru
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - chat-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks:
      - chat-network

  # autoheal (issue #41): plain Docker Compose `restart:` policies react to a
  # container *exiting*, NOT to it going `unhealthy`. dify-api's failure mode is a
  # gunicorn master that stays UP with zero workers, so its own restart policy
  # never fires. autoheal watches every container labelled `autoheal=true` and
  # `docker restart`s it once Docker marks it unhealthy — turning the healthcheck
  # into an actual self-recovery loop. Only labelled containers are touched.
  autoheal:
    image: willfarrell/autoheal:1.2.0
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "15"        # seconds between unhealthy scans
      AUTOHEAL_START_PERIOD: "120"   # grace before autoheal starts acting
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: "30"
      DOCKER_SOCK: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - chat-network

volumes:
  postgres-data:
  redis-data:

networks:
  chat-network:
    external: true
    name: nexaduo-network
