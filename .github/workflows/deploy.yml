name: Deploy production (segmented)

on:
  workflow_dispatch:
    inputs:
      segment:
        description: 'Which layer to apply'
        required: true
        type: choice
        default: validate
        options:
          - validate          # public smoke checks; no writes
          - routes            # refresh Traefik proxy routes (fast, no terraform)
          - sync              # synchronize tenants from tenants.yaml to DB
          - tenant            # terraform apply tenant (Coolify services + envs)
          - build-images      # build & push middleware/self-healing images
          - bootstrap         # bootstrap-coolify.sh (installs Coolify on the VM)
          - foundation        # terraform apply foundation (VM, VPC, DNS, Tunnel, AR)
          - onboarding        # onboard-prod.sh (create Chatwoot+Dify admins)
          - all               # full pipeline, in deploy-production.sh order
      dry_run:
        description: 'Plan-only (terraform plan, no apply, no image push). Default true for safety.'
        required: true
        type: boolean
        default: true
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      tenant_subset:
        description: 'For segment=tenant: which service to apply via -target. "all" = everything.'
        required: false
        type: choice
        default: all
        options:
          - all
          - chatwoot
          - dify
          - nexaduo
          - shared
      skip_grafana:
        description: 'For segment=routes: skip Grafana when its container is down.'
        required: false
        type: boolean
        default: true
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write   # WIF

env:
  TZ: America/Sao_Paulo
  TF_VERSION: 1.9.8
  PROJECT_ID: nexaduo-492818
  ZONE: us-central1-b
  REGION: us-central1
  BASE_DOMAIN: nexaduo.com
  TFVARS_PATH: infrastructure/terraform/envs/production/terraform.tfvars

# Prevent two runs of the same event/branch racing on terraform state.
concurrency:
  group: deploy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # -----------------------------------------------------------------------
  # resolve-env: parses tenants.yaml and outputs active environment metadata
  # -----------------------------------------------------------------------
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      target_environment: ${{ steps.resolve.outputs.target_environment }}
      is_dry_run: ${{ steps.resolve.outputs.is_dry_run }}
      target_segment: ${{ steps.resolve.outputs.target_segment }}
      vm_name: ${{ steps.resolve.outputs.vm_name }}
      primary_url: ${{ steps.resolve.outputs.primary_url }}
      tenants: ${{ steps.resolve.outputs.tenants }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Environment Parameters
        id: resolve
        run: |
          # 1. Resolve TARGET_ENVIRONMENT
          # Manual inputs.environment has precedence. Otherwise, pull_request targets staging, push targets production.
          ENV="${{ inputs.environment }}"
          if [[ -z "$ENV" ]]; then
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              ENV="staging"
            else
              ENV="production"
            fi
          fi
          echo "target_environment=$ENV" >> "$GITHUB_OUTPUT"

          # 2. Resolve IS_DRY_RUN
          # Manual inputs.dry_run has precedence. Otherwise, automatic events execute apply (false).
          DRY="${{ inputs.dry_run }}"
          if [[ -z "$DRY" ]]; then
            DRY="false"
          fi
          echo "is_dry_run=$DRY" >> "$GITHUB_OUTPUT"

          # 3. Resolve TARGET_SEGMENT
          # Manual inputs.segment has precedence. Otherwise, automatic is 'all'.
          SEG="${{ inputs.segment }}"
          if [[ -z "$SEG" ]]; then
            SEG="all"
          fi
          echo "target_segment=$SEG" >> "$GITHUB_OUTPUT"

          # 4. Resolve VM_NAME
          if [[ "$ENV" == "production" ]]; then
            VM="nexaduo-chat-services"
          else
            VM="nexaduo-chat-services-staging"
          fi
          echo "vm_name=$VM" >> "$GITHUB_OUTPUT"

          # 5. Parse tenants.yaml to extract matching active tenants
          TENANTS_JSON=$(yq eval -o=json ".tenants[] | select(.status == \"active\" and .environment == \"$ENV\")" tenants.yaml | jq -c -s '.')
          echo "tenants=$TENANTS_JSON" >> "$GITHUB_OUTPUT"

          # 6. Resolve primary URL
          PRIMARY_URL=$(echo "$TENANTS_JSON" | jq -r '.[0].infra.chatwoot_url // empty')
          if [[ -z "$PRIMARY_URL" ]]; then
            if [[ "$ENV" == "production" ]]; then
              PRIMARY_URL="https://chat.nexaduo.com"
            else
              PRIMARY_URL="https://chat-stg.nexaduo.com"
            fi
          fi
          echo "primary_url=$PRIMARY_URL" >> "$GITHUB_OUTPUT"

          # Print outputs for validation in log
          echo "=== RESOLVED PARAMETERS ==="
          echo "Target Environment: $ENV"
          echo "Is Dry Run: $DRY"
          echo "Target Segment: $SEG"
          echo "VM Name: $VM"
          echo "Primary URL: $PRIMARY_URL"
          echo "Tenants JSON: $TENANTS_JSON"

  # -----------------------------------------------------------------------
  # foundation: terraform apply for the infra layer (VM, VPC, DNS, Tunnel, AR)
  # -----------------------------------------------------------------------
  foundation:
    needs: [resolve-env]
    if: needs.resolve-env.outputs.target_segment == 'foundation' || needs.resolve-env.outputs.target_segment == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ needs.resolve-env.outputs.target_environment }}
      url: ${{ needs.resolve-env.outputs.primary_url }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Restore terraform.tfvars from Secret Manager
        run: |
          gcloud secrets versions access latest \
            --secret=terraform_tfvars_${{ needs.resolve-env.outputs.target_environment }} \
            --project="${PROJECT_ID}" > "${TFVARS_PATH}"

      - name: Terraform init
        working-directory: infrastructure/terraform/envs/production/foundation
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=nexaduo-terraform-state" \
            -backend-config="prefix=${{ vars.TF_BACKEND_PREFIX_FOUNDATION }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Select or Create Workspace
        working-directory: infrastructure/terraform/envs/production/foundation
        run: |
          terraform workspace select "${{ needs.resolve-env.outputs.target_environment }}" || terraform workspace new "${{ needs.resolve-env.outputs.target_environment }}"

      - name: Preflight (undelete + import WIF/tunnel survivors)
        working-directory: infrastructure/terraform/envs/production/foundation
        run: |
          chmod +x ../../../../../scripts/preflight-foundation.sh
          ../../../../../scripts/preflight-foundation.sh

      - name: Terraform plan
        working-directory: infrastructure/terraform/envs/production/foundation
        run: terraform plan -var-file=../terraform.tfvars -out=tfplan.bin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Show plan (redacted)
        working-directory: infrastructure/terraform/envs/production/foundation
        run: terraform show -no-color tfplan.bin | head -c 100000

      - name: Terraform apply (skipped if dry_run)
        if: needs.resolve-env.outputs.is_dry_run == 'false'
        working-directory: infrastructure/terraform/envs/production/foundation
        run: terraform apply -auto-approve tfplan.bin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # -----------------------------------------------------------------------
  # bootstrap: install Coolify on the VM (one-time per VM)
  # -----------------------------------------------------------------------
  bootstrap:
    needs: [resolve-env, foundation]
    if: |
      always() &&
      (needs.resolve-env.outputs.target_segment == 'bootstrap' ||
       (needs.resolve-env.outputs.target_segment == 'all' && needs.foundation.result == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (foundation, for `terraform output`)
        working-directory: infrastructure/terraform/envs/production/foundation
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=nexaduo-terraform-state" \
            -backend-config="prefix=${{ vars.TF_BACKEND_PREFIX_FOUNDATION }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Select Workspace
        working-directory: infrastructure/terraform/envs/production/foundation
        run: |
          terraform workspace select "${{ needs.resolve-env.outputs.target_environment }}"

      - name: Bootstrap Coolify
        if: needs.resolve-env.outputs.is_dry_run == 'false'
        run: |
          chmod +x scripts/bootstrap-coolify.sh
          ./scripts/bootstrap-coolify.sh

      - name: Dry-run note
        if: needs.resolve-env.outputs.is_dry_run == 'true'
        run: echo "::notice::dry_run=true; skipping bootstrap-coolify.sh."

  # -----------------------------------------------------------------------
  # build-images: builds and publishes intermediate stack images
  # -----------------------------------------------------------------------
  build-images:
    needs: [resolve-env]
    if: |
      (needs.resolve-env.outputs.target_segment == 'build-images' || needs.resolve-env.outputs.target_segment == 'all') &&
      needs.resolve-env.outputs.is_dry_run == 'false'
    uses: ./.github/workflows/publish-images.yml
    secrets: inherit
    with:
      tag: deploy-${{ github.run_id }}

  # -----------------------------------------------------------------------
  # tenant: terraform apply tenant (Coolify services + envs)
  # -----------------------------------------------------------------------
  tenant:
    needs: [resolve-env, build-images, bootstrap]
    if: |
      always() &&
      (needs.resolve-env.outputs.target_segment == 'tenant' ||
       (needs.resolve-env.outputs.target_segment == 'all' && 
        (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') &&
        (needs.bootstrap.result == 'success' || needs.bootstrap.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: ${{ needs.resolve-env.outputs.target_environment }}
      url: ${{ needs.resolve-env.outputs.primary_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Restore terraform.tfvars from Secret Manager
        run: |
          gcloud secrets versions access latest \
            --secret=terraform_tfvars_${{ needs.resolve-env.outputs.target_environment }} \
            --project="${PROJECT_ID}" > "${TFVARS_PATH}"

      - name: Terraform init
        working-directory: infrastructure/terraform/envs/production/tenant
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=nexaduo-terraform-state" \
            -backend-config="prefix=${{ vars.TF_BACKEND_PREFIX_TENANT }}"

      - name: Select or Create Workspace
        working-directory: infrastructure/terraform/envs/production/tenant
        run: |
          terraform workspace select "${{ needs.resolve-env.outputs.target_environment }}" || terraform workspace new "${{ needs.resolve-env.outputs.target_environment }}"

      - name: Compute -target args (tenant_subset)
        id: targets
        run: |
          case "${{ inputs.tenant_subset || 'all' }}" in
            chatwoot) echo "args=-target=coolify_service.chatwoot -target=coolify_service_envs.chatwoot" >> "$GITHUB_OUTPUT" ;;
            dify)     echo "args=-target=coolify_service.dify     -target=coolify_service_envs.dify"     >> "$GITHUB_OUTPUT" ;;
            nexaduo)  echo "args=-target=coolify_service.nexaduo  -target=coolify_service_envs.nexaduo"  >> "$GITHUB_OUTPUT" ;;
            shared)   echo "args=-target=coolify_service.shared   -target=coolify_service_envs.shared"   >> "$GITHUB_OUTPUT" ;;
            *)        echo "args=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Terraform plan
        working-directory: infrastructure/terraform/envs/production/tenant
        run: terraform plan -var-file=../terraform.tfvars ${{ steps.targets.outputs.args }} -out=tfplan.bin

      - name: Show plan (redacted)
        working-directory: infrastructure/terraform/envs/production/tenant
        run: terraform show -no-color tfplan.bin | head -c 100000

      - name: Terraform apply with 409-aware retry (skipped if dry_run)
        if: needs.resolve-env.outputs.is_dry_run == 'false'
        working-directory: infrastructure/terraform/envs/production/tenant
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "::group::Apply attempt $attempt"
            terraform apply -auto-approve tfplan.bin 2>&1 | tee /tmp/tf-apply.log
            rc=${PIPESTATUS[0]}
            echo "::endgroup::"
            [[ $rc -eq 0 ]] && exit 0
            if grep -qiE "409 Conflict|already exists" /tmp/tf-apply.log; then
              echo "::warning::Detected Coolify conflict on service envs; cleaning auto-populated envs."
              chmod +x ../../../../../scripts/clean-service-envs.sh
              ../../../../../scripts/clean-service-envs.sh
              terraform plan -var-file=../terraform.tfvars ${{ steps.targets.outputs.args }} -out=tfplan.bin
              continue
            fi
            echo "::error::Apply failed with a non-409 error; not retrying." >&2
            exit "$rc"
          done
          exit 1

      - name: Redeploy services to pick up env vars
        if: needs.resolve-env.outputs.is_dry_run == 'false'
        run: |
          url="$(gcloud secrets versions access latest --secret=coolify_url --project="${{ env.PROJECT_ID }}")"
          token="$(gcloud secrets versions access latest --secret=coolify_api_token --project="${{ env.PROJECT_ID }}")"
          base="${url%/api/v1}"
          
          echo "=== Re-deploying tenant services ==="
          for svc in shared chatwoot dify nexaduo; do
            uuid="$(cd infrastructure/terraform/envs/production/tenant && terraform state show "coolify_service.${svc}" 2>/dev/null \
              | awk '/^    uuid /{gsub(/"/,""); print $3; exit}' || true)"
            [[ -z "${uuid}" ]] && continue
            echo "  deploying ${svc} (${uuid})..."
            curl -sS -o /dev/null -X POST -H "Authorization: Bearer ${token}" "${base}/api/v1/deploy?uuid=${uuid}"
          done

  # -----------------------------------------------------------------------
  # routes: refresh the Coolify proxy (Traefik) - fast, no terraform
  # -----------------------------------------------------------------------
  routes:
    needs: [resolve-env, tenant]
    if: |
      always() &&
      (needs.resolve-env.outputs.target_segment == 'routes' ||
       (needs.resolve-env.outputs.target_segment == 'all' && (needs.tenant.result == 'success' || needs.tenant.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Refresh Coolify routes
        if: needs.resolve-env.outputs.is_dry_run == 'false'
        env:
          BASE_DOMAIN: ${{ env.BASE_DOMAIN }}
          PROJECT_ID: ${{ env.PROJECT_ID }}
          ZONE: ${{ env.ZONE }}
          VM_NAME: ${{ needs.resolve-env.outputs.vm_name }}
          SKIP_GRAFANA: ${{ (inputs.skip_grafana || 'true') && 'true' || 'false' }}
        run: |
          chmod +x scripts/refresh-coolify-routes.sh
          ./scripts/refresh-coolify-routes.sh

      - name: Dry-run note
        if: needs.resolve-env.outputs.is_dry_run == 'true'
        run: echo "::notice::dry_run=true; skipping refresh-coolify-routes.sh."

  # -----------------------------------------------------------------------
  # sync: synchronize tenants from tenants.yaml to Postgres
  # -----------------------------------------------------------------------
  sync:
    needs: [resolve-env, tenant, routes]
    if: |
      always() &&
      (needs.resolve-env.outputs.target_segment == 'sync' ||
       (needs.resolve-env.outputs.target_segment == 'all' && 
        needs.tenant.result == 'success' && 
        (needs.routes.result == 'success' || needs.routes.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Fetch and mask secrets
        id: secrets
        run: |
          DB_URL=$(gcloud secrets versions access latest --secret=${{ needs.resolve-env.outputs.target_environment }}_database_url --project="${{ env.PROJECT_ID }}")
          echo "::add-mask::$DB_URL"
          echo "database_url=$DB_URL" >> "$GITHUB_OUTPUT"

          HANDOFF_SECRET=$(gcloud secrets versions access latest --secret=handoff_shared_secret --project="${{ env.PROJECT_ID }}")
          echo "::add-mask::$HANDOFF_SECRET"
          echo "handoff_secret=$HANDOFF_SECRET" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync tenants
        if: needs.resolve-env.outputs.is_dry_run == 'false'
        env:
          DATABASE_URL: ${{ steps.secrets.outputs.database_url }}
          HANDOFF_SHARED_SECRET: ${{ steps.secrets.outputs.handoff_secret }}
        run: |
          echo "Establishing IAP tunnel..."
          gcloud compute ssh "${{ needs.resolve-env.outputs.vm_name }}" \
            --project="${{ env.PROJECT_ID }}" \
            --zone="${{ env.ZONE }}" \
            --tunnel-through-iap \
            -- -L 5432:localhost:5432 -N -f
          
          for i in $(seq 1 10); do
            if nc -z localhost 5432; then
              echo "Tunnel ready."
              break
            fi
            sleep 2
          done
          
          npm run tenants:sync -- "${{ needs.resolve-env.outputs.target_environment }}"
          
          pkill -f "gcloud compute ssh.*-L 5432:localhost:5432" || true

      - name: Dry-run note
        if: needs.resolve-env.outputs.is_dry_run == 'true'
        run: echo "::notice::dry_run=true; skipping tenants:sync."

  # -----------------------------------------------------------------------
  # onboarding: create initial admins (idempotent; safe on re-runs)
  # -----------------------------------------------------------------------
  onboarding:
    needs: [resolve-env, tenant, sync]
    if: |
      always() &&
      (needs.resolve-env.outputs.target_segment == 'onboarding' ||
       (needs.resolve-env.outputs.target_segment == 'all' && 
        needs.tenant.result == 'success' && 
        (needs.sync.result == 'success' || needs.sync.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Onboard admins
        if: needs.resolve-env.outputs.is_dry_run == 'false'
        run: |
          chmod +x scripts/onboard-prod.sh
          ./scripts/onboard-prod.sh

      - name: Dry-run note
        if: needs.resolve-env.outputs.is_dry_run == 'true'
        run: echo "::notice::dry_run=true; skipping onboard-prod.sh."

  # -----------------------------------------------------------------------
  # validate: public smoke probes using a dynamic GHA matrix
  # -----------------------------------------------------------------------
  validate:
    needs: [resolve-env, tenant, onboarding]
    if: |
      always() &&
      (needs.resolve-env.outputs.target_segment == 'validate' ||
       (needs.resolve-env.outputs.target_segment == 'all' && 
        needs.tenant.result == 'success' && 
        (needs.onboarding.result == 'success' || needs.onboarding.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        tenant: ${{ fromJson(needs.resolve-env.outputs.tenants) }}
    steps:
      - uses: actions/checkout@v4

      - name: Public smoke (HTTPS reachability)
        run: |
          set -u
          fail=0
          
          chatwoot_url="${{ matrix.tenant.infra.chatwoot_url }}"
          dify_url="${{ matrix.tenant.infra.dify_url }}"
          
          # Check Chatwoot
          echo "Checking Chatwoot at ${chatwoot_url} ..."
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 -L "${chatwoot_url}/" || echo "ERR")
          echo "  -> Status: ${code}"
          case "${code}" in
            2*|3*|401|403) ;;
            *) echo "::error::Chatwoot ${chatwoot_url} returned ${code}"; fail=1 ;;
          esac

          # Check Dify console API setup check
          echo "Checking Dify setup API at ${dify_url}/console/api/setup ..."
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "${dify_url}/console/api/setup" || echo "ERR")
          echo "  -> Status: ${code}"
          case "${code}" in
            200|403) ;;
            *) echo "::error::Dify API setup check failed for ${dify_url} with status ${code}"; fail=1 ;;
          esac

          [[ $fail -eq 0 ]] || { echo "::error::Smoke checks failed."; exit 1; }

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: onboarding/package-lock.json

      - name: Install Playwright
        working-directory: onboarding
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright OAuth checks
        working-directory: onboarding
        env:
          ENVIRONMENT: ${{ needs.resolve-env.outputs.target_environment }}
        run: npx playwright test 04-oauth.spec.ts

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.tenant.slug }}-${{ github.run_id }}
          path: onboarding/playwright-report
          retention-days: 14
