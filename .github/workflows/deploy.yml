name: Deploy production (segmented)

# Manual production deploy of the stack, segmented by layer to reduce blast
# radius and let operators re-apply only what changed. Each job is independent;
# pick "all" for the full pipeline (foundation -> bootstrap -> build-images ->
# tenant -> routes -> onboarding -> validate).
#
# One-time setup: see docs/deploy-via-github-actions.md
#   - Repo variables: TF_BACKEND_PREFIX_FOUNDATION, TF_BACKEND_PREFIX_TENANT,
#     GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_DEPLOYER_SERVICE_ACCOUNT
#   - Repo secrets: CLOUDFLARE_API_TOKEN (consumed by the Cloudflare provider)

on:
  workflow_dispatch:
    inputs:
      segment:
        description: 'Which layer to apply'
        required: true
        type: choice
        default: validate
        options:
          - validate          # public smoke checks; no writes
          - routes            # refresh Traefik proxy routes (fast, no terraform)
          - tenant            # terraform apply tenant (Coolify services + envs)
          - build-images      # build & push middleware/self-healing images
          - bootstrap         # bootstrap-coolify.sh (installs Coolify on the VM)
          - foundation        # terraform apply foundation (VM, VPC, DNS, Tunnel, AR)
          - onboarding        # onboard-prod.sh (create Chatwoot+Dify admins)
          - all               # full pipeline, in deploy-production.sh order
      dry_run:
        description: 'Plan-only (terraform plan, no apply, no image push). Default true for safety.'
        required: true
        type: boolean
        default: true
      tenant_subset:
        description: 'For segment=tenant: which service to apply via -target. "all" = everything.'
        required: false
        type: choice
        default: all
        options:
          - all
          - chatwoot
          - dify
          - nexaduo
          - shared
      skip_grafana:
        description: 'For segment=routes: skip Grafana when its container is down.'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write   # WIF

env:
  TZ: America/Sao_Paulo
  TF_VERSION: 1.9.8
  PROJECT_ID: nexaduo-492818
  ZONE: us-central1-b
  REGION: us-central1
  VM_NAME: nexaduo-chat-services
  BASE_DOMAIN: nexaduo.com
  TFVARS_PATH: infrastructure/terraform/envs/production/terraform.tfvars

# Prevent two runs of the same segment racing on terraform state.
concurrency:
  group: deploy-prod-${{ inputs.segment }}
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------------------
  # foundation: terraform apply for the infra layer (VM, VPC, DNS, Tunnel, AR)
  # -----------------------------------------------------------------------
  foundation:
    if: inputs.segment == 'foundation' || inputs.segment == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://${{ env.BASE_DOMAIN }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Restore terraform.tfvars from Secret Manager
        run: |
          gcloud secrets versions access latest \
            --secret=terraform_tfvars_production \
            --project="${PROJECT_ID}" > "${TFVARS_PATH}"

      # Init MUST run before preflight: preflight uses `terraform state show/import`
      # which requires an initialized backend.
      - name: Terraform init
        working-directory: infrastructure/terraform/envs/production/foundation
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=nexaduo-terraform-state" \
            -backend-config="prefix=${{ vars.TF_BACKEND_PREFIX_FOUNDATION }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Preflight (undelete + import WIF/tunnel survivors)
        working-directory: infrastructure/terraform/envs/production/foundation
        run: |
          chmod +x ../../../../../scripts/preflight-foundation.sh
          ../../../../../scripts/preflight-foundation.sh

      - name: Terraform plan
        working-directory: infrastructure/terraform/envs/production/foundation
        run: terraform plan -var-file=../terraform.tfvars -out=tfplan.bin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Plan is shown as redacted text in the job log only. We deliberately do NOT
      # upload tfplan.bin: the foundation plan includes Cloudflare API tokens and
      # a binary plan artifact would expose them to anyone with Actions read access.
      - name: Show plan (redacted)
        working-directory: infrastructure/terraform/envs/production/foundation
        run: terraform show -no-color tfplan.bin | head -c 100000

      - name: Terraform apply (skipped if dry_run)
        if: inputs.dry_run == false
        working-directory: infrastructure/terraform/envs/production/foundation
        run: terraform apply -auto-approve tfplan.bin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # -----------------------------------------------------------------------
  # bootstrap: install Coolify on the VM (one-time per VM)
  # -----------------------------------------------------------------------
  bootstrap:
    needs: [foundation]
    # foundation may have been skipped when segment=bootstrap; always() + result
    # check handles the GH Actions skip-cascade.
    if: |
      always() &&
      (inputs.segment == 'bootstrap' ||
       (inputs.segment == 'all' && needs.foundation.result == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # bootstrap-coolify.sh runs `terraform output -raw tunnel_token` from the
      # foundation layer. GH Actions jobs are isolated, so we must install
      # Terraform here and re-init the foundation backend.
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (foundation, for `terraform output`)
        working-directory: infrastructure/terraform/envs/production/foundation
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=nexaduo-terraform-state" \
            -backend-config="prefix=${{ vars.TF_BACKEND_PREFIX_FOUNDATION }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Bootstrap Coolify
        if: inputs.dry_run == false
        run: |
          chmod +x scripts/bootstrap-coolify.sh
          ./scripts/bootstrap-coolify.sh

      - name: Dry-run note
        if: inputs.dry_run == true
        run: echo "::notice::dry_run=true; skipping bootstrap-coolify.sh."

  # -----------------------------------------------------------------------
  # build-images: invokes the existing publish-images.yml as a reusable workflow.
  # Skipped on dry_run (image push has side effects: AR storage + tag pollution).
  # -----------------------------------------------------------------------
  build-images:
    if: |
      (inputs.segment == 'build-images' || inputs.segment == 'all') &&
      inputs.dry_run == false
    uses: ./.github/workflows/publish-images.yml
    secrets: inherit
    with:
      tag: deploy-${{ github.run_id }}

  # -----------------------------------------------------------------------
  # tenant: terraform apply tenant (Coolify services + envs)
  # -----------------------------------------------------------------------
  tenant:
    needs: [build-images]
    if: |
      always() &&
      (inputs.segment == 'tenant' ||
       (inputs.segment == 'all' && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Restore terraform.tfvars from Secret Manager
        run: |
          gcloud secrets versions access latest \
            --secret=terraform_tfvars_production \
            --project="${PROJECT_ID}" > "${TFVARS_PATH}"

      - name: Terraform init
        working-directory: infrastructure/terraform/envs/production/tenant
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=nexaduo-terraform-state" \
            -backend-config="prefix=${{ vars.TF_BACKEND_PREFIX_TENANT }}"

      - name: Compute -target args (tenant_subset)
        id: targets
        run: |
          case "${{ inputs.tenant_subset }}" in
            chatwoot) echo "args=-target=coolify_service.chatwoot -target=coolify_service_envs.chatwoot" >> "$GITHUB_OUTPUT" ;;
            dify)     echo "args=-target=coolify_service.dify     -target=coolify_service_envs.dify"     >> "$GITHUB_OUTPUT" ;;
            nexaduo)  echo "args=-target=coolify_service.nexaduo  -target=coolify_service_envs.nexaduo"  >> "$GITHUB_OUTPUT" ;;
            shared)   echo "args=-target=coolify_service.shared   -target=coolify_service_envs.shared"   >> "$GITHUB_OUTPUT" ;;
            *)        echo "args=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Terraform plan
        working-directory: infrastructure/terraform/envs/production/tenant
        run: terraform plan -var-file=../terraform.tfvars ${{ steps.targets.outputs.args }} -out=tfplan.bin

      # Show plan as redacted text in the job log; do NOT upload tfplan.bin as
      # an artifact. The tenant plan embeds secret values pulled from Secret
      # Manager (Postgres password, OAuth secret, etc.), and any user with
      # Actions read access could download the binary plan and extract them.
      - name: Show plan (redacted)
        working-directory: infrastructure/terraform/envs/production/tenant
        run: terraform show -no-color tfplan.bin | head -c 100000

      - name: Terraform apply with 409-aware retry (skipped if dry_run)
        if: inputs.dry_run == false
        working-directory: infrastructure/terraform/envs/production/tenant
        # Mirror apply-tenant.sh logic: only retry the known Coolify race
        # ("409 Conflict creating service envs"), and run clean-service-envs.sh
        # between attempts. Any other error fails fast so we do not mask real
        # bugs (credentials, schema drift, etc.).
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "::group::Apply attempt $attempt"
            terraform apply -auto-approve tfplan.bin 2>&1 | tee /tmp/tf-apply.log
            rc=${PIPESTATUS[0]}
            echo "::endgroup::"
            [[ $rc -eq 0 ]] && exit 0
            if grep -q "409 Conflict creating service envs" /tmp/tf-apply.log; then
              echo "::warning::Detected Coolify 409 on service envs; cleaning auto-populated envs."
              chmod +x ../../../../../scripts/clean-service-envs.sh
              ../../../../../scripts/clean-service-envs.sh
              # Re-plan after the clean to refresh state.
              terraform plan -var-file=../terraform.tfvars ${{ steps.targets.outputs.args }} -out=tfplan.bin
              continue
            fi
            echo "::error::Apply failed with a non-409 error; not retrying." >&2
            exit "$rc"
          done
          exit 1

  # -----------------------------------------------------------------------
  # routes: refresh the Coolify proxy (Traefik) - fast, no terraform
  # -----------------------------------------------------------------------
  routes:
    needs: [tenant]
    if: |
      always() &&
      (inputs.segment == 'routes' ||
       (inputs.segment == 'all' && (needs.tenant.result == 'success' || needs.tenant.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Refresh Coolify routes
        if: inputs.dry_run == false
        env:
          BASE_DOMAIN: ${{ env.BASE_DOMAIN }}
          PROJECT_ID: ${{ env.PROJECT_ID }}
          ZONE: ${{ env.ZONE }}
          VM_NAME: ${{ env.VM_NAME }}
          # SKIP_GRAFANA=true tells refresh-coolify-routes.sh to omit the Grafana
          # route from the Traefik fallback so this segment can recover Chatwoot/
          # Dify even when nexaduo-app (Grafana) is down.
          SKIP_GRAFANA: ${{ inputs.skip_grafana && 'true' || 'false' }}
        run: |
          chmod +x scripts/refresh-coolify-routes.sh
          ./scripts/refresh-coolify-routes.sh

      - name: Dry-run note
        if: inputs.dry_run == true
        run: echo "::notice::dry_run=true; skipping refresh-coolify-routes.sh."

  # -----------------------------------------------------------------------
  # onboarding: create initial admins (idempotent; safe on re-runs)
  # -----------------------------------------------------------------------
  onboarding:
    needs: [routes]
    if: |
      always() &&
      (inputs.segment == 'onboarding' ||
       (inputs.segment == 'all' && (needs.routes.result == 'success' || needs.routes.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Onboard admins
        if: inputs.dry_run == false
        run: |
          chmod +x scripts/onboard-prod.sh
          ./scripts/onboard-prod.sh

      - name: Dry-run note
        if: inputs.dry_run == true
        run: echo "::notice::dry_run=true; skipping onboard-prod.sh."

  # -----------------------------------------------------------------------
  # validate: public smoke probes against production. Must NOT depend on
  # local Docker, localhost ports, or admin credentials.
  # -----------------------------------------------------------------------
  validate:
    needs: [onboarding]
    if: |
      always() &&
      (inputs.segment == 'validate' ||
       (inputs.segment == 'all' && (needs.onboarding.result == 'success' || needs.onboarding.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Public probes against the edge: every domain must respond and not 502.
      # We DO NOT call health-check-all.sh here: that script targets local Docker
      # and is meant to run on the VM. Run it remotely from a separate task if
      # you need container-level health.
      - name: Public smoke (HTTPS reachability)
        run: |
          set -u
          fail=0
          for host in chat.${BASE_DOMAIN} dify.${BASE_DOMAIN} coolify.${BASE_DOMAIN}; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 -L "https://${host}/" || echo "ERR")
            echo "  https://${host}/ -> ${code}"
            case "${code}" in
              2*|3*) ;;          # OK / redirect to login is expected
              *)     fail=1 ;;
            esac
          done
          # Dify console API setup must respond 200 (auth-free).
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "https://dify.${BASE_DOMAIN}/console/api/setup" || echo "ERR")
          echo "  https://dify.${BASE_DOMAIN}/console/api/setup -> ${code}"
          [[ "${code}" == "200" ]] || fail=1
          [[ $fail -eq 0 ]] || { echo "::error::Public smoke failed."; exit 1; }

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: onboarding/package-lock.json

      - name: Install Playwright
        working-directory: onboarding
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # OAuth spec uses production URLs and unauthenticated endpoints; no
      # ADMIN_PASSWORD required. Tracks issue #5.
      - name: Run Playwright OAuth checks
        working-directory: onboarding
        env:
          BASE_URL_CHATWOOT: https://chat.${{ env.BASE_DOMAIN }}
          BASE_URL_DIFY: https://dify.${{ env.BASE_DOMAIN }}
        run: npx playwright test 04-oauth.spec.ts

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: onboarding/playwright-report
          retention-days: 14
