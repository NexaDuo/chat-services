name: Deploy production (segmented)

# Manual deploy do stack em producao, segmentado por camada para reduzir blast radius
# e permitir re-aplicar so o que mudou. Cada job e independente; rode "all" para o
# pipeline completo (foundation -> bootstrap -> build-images -> tenant -> routes ->
# onboarding -> validate).
#
# Setup (uma vez): ver docs/deploy-via-github-actions.md
#   - Repo variables: TF_BACKEND_PREFIX_FOUNDATION, TF_BACKEND_PREFIX_TENANT,
#     GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_DEPLOYER_SERVICE_ACCOUNT
#   - Repo secrets: CLOUDFLARE_API_TOKEN (consumido pelo provider Cloudflare)

on:
  workflow_dispatch:
    inputs:
      segment:
        description: 'Qual camada aplicar'
        required: true
        type: choice
        default: validate
        options:
          - validate          # smoke + health, nao escreve nada
          - routes            # refresh Traefik proxy routes (rapido, nao toca terraform)
          - tenant            # terraform apply tenant (Coolify services + envs)
          - build-images      # build & push middleware/self-healing
          - bootstrap         # bootstrap-coolify.sh (instala Coolify na VM)
          - foundation        # terraform apply foundation (VM, VPC, DNS, Tunnel, AR)
          - onboarding        # onboard-prod.sh (criar admins Chatwoot+Dify)
          - all               # pipeline completo, ordem do deploy-production.sh
      dry_run:
        description: 'Apenas plan (terraform plan, sem apply). Default true por seguranca.'
        required: true
        type: boolean
        default: true
      tenant_subset:
        description: 'Para segment=tenant: qual servico aplicar via -target. "all" = todos.'
        required: false
        type: choice
        default: all
        options:
          - all
          - chatwoot
          - dify
          - nexaduo
          - shared

permissions:
  contents: read
  id-token: write   # WIF

env:
  TZ: America/Sao_Paulo
  TF_VERSION: 1.9.8
  PROJECT_ID: nexaduo-492818
  ZONE: us-central1-b
  REGION: us-central1
  VM_NAME: nexaduo-chat-services
  BASE_DOMAIN: nexaduo.com
  TFVARS_PATH: infrastructure/terraform/envs/production/terraform.tfvars

# Cancela runs duplicados na mesma camada para evitar race em terraform state.
concurrency:
  group: deploy-prod-${{ inputs.segment }}
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------------------
  # foundation: terraform apply na camada de infra (VM, VPC, DNS, Tunnel, AR)
  # -----------------------------------------------------------------------
  foundation:
    if: inputs.segment == 'foundation' || inputs.segment == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://${{ env.BASE_DOMAIN }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Restore terraform.tfvars from Secret Manager
        run: |
          gcloud secrets versions access latest \
            --secret=terraform_tfvars_production \
            --project="${PROJECT_ID}" > "${TFVARS_PATH}"

      - name: Preflight (undelete + import WIF/tunnel survivors)
        working-directory: infrastructure/terraform/envs/production/foundation
        run: |
          chmod +x ../../../../../scripts/preflight-foundation.sh
          ../../../../../scripts/preflight-foundation.sh

      - name: Terraform init
        working-directory: infrastructure/terraform/envs/production/foundation
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=nexaduo-terraform-state" \
            -backend-config="prefix=${{ vars.TF_BACKEND_PREFIX_FOUNDATION }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Terraform plan
        working-directory: infrastructure/terraform/envs/production/foundation
        run: terraform plan -var-file=../terraform.tfvars -out=tfplan.bin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload plan as artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundation-tfplan-${{ github.run_id }}
          path: infrastructure/terraform/envs/production/foundation/tfplan.bin
          retention-days: 14

      - name: Terraform apply (skipped if dry_run)
        if: inputs.dry_run == false
        working-directory: infrastructure/terraform/envs/production/foundation
        run: terraform apply -auto-approve tfplan.bin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # -----------------------------------------------------------------------
  # bootstrap: instala Coolify na VM (uma vez por VM)
  # -----------------------------------------------------------------------
  bootstrap:
    needs: [foundation]
    # foundation pode ter sido pulado quando segment=bootstrap; always() + check em
    # result trata o "skip cascade" do GH Actions.
    if: |
      always() &&
      (inputs.segment == 'bootstrap' ||
       (inputs.segment == 'all' && needs.foundation.result == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Bootstrap Coolify
        if: inputs.dry_run == false
        run: |
          chmod +x scripts/bootstrap-coolify.sh
          ./scripts/bootstrap-coolify.sh

      - name: Dry-run note
        if: inputs.dry_run == true
        run: echo "::notice::dry_run=true; pulando bootstrap-coolify.sh."

  # -----------------------------------------------------------------------
  # build-images: chama o workflow ja existente publish-images.yml
  # -----------------------------------------------------------------------
  build-images:
    if: inputs.segment == 'build-images' || inputs.segment == 'all'
    uses: ./.github/workflows/publish-images.yml
    secrets: inherit
    with:
      tag: deploy-${{ github.run_id }}

  # -----------------------------------------------------------------------
  # tenant: terraform apply tenant (Coolify services + envs)
  # -----------------------------------------------------------------------
  tenant:
    needs: [build-images]
    if: |
      always() &&
      (inputs.segment == 'tenant' ||
       (inputs.segment == 'all' && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Restore terraform.tfvars from Secret Manager
        run: |
          gcloud secrets versions access latest \
            --secret=terraform_tfvars_production \
            --project="${PROJECT_ID}" > "${TFVARS_PATH}"

      - name: Terraform init
        working-directory: infrastructure/terraform/envs/production/tenant
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=nexaduo-terraform-state" \
            -backend-config="prefix=${{ vars.TF_BACKEND_PREFIX_TENANT }}"

      - name: Compute -target args (tenant_subset)
        id: targets
        run: |
          case "${{ inputs.tenant_subset }}" in
            chatwoot) echo "args=-target=coolify_service.chatwoot -target=coolify_service_envs.chatwoot" >> "$GITHUB_OUTPUT" ;;
            dify)     echo "args=-target=coolify_service.dify     -target=coolify_service_envs.dify"     >> "$GITHUB_OUTPUT" ;;
            nexaduo)  echo "args=-target=coolify_service.nexaduo  -target=coolify_service_envs.nexaduo"  >> "$GITHUB_OUTPUT" ;;
            shared)   echo "args=-target=coolify_service.shared   -target=coolify_service_envs.shared"   >> "$GITHUB_OUTPUT" ;;
            *)        echo "args=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Terraform plan
        working-directory: infrastructure/terraform/envs/production/tenant
        run: terraform plan -var-file=../terraform.tfvars ${{ steps.targets.outputs.args }} -out=tfplan.bin

      - uses: actions/upload-artifact@v4
        with:
          name: tenant-tfplan-${{ github.run_id }}
          path: infrastructure/terraform/envs/production/tenant/tfplan.bin
          retention-days: 14

      - name: Terraform apply (skipped if dry_run)
        if: inputs.dry_run == false
        working-directory: infrastructure/terraform/envs/production/tenant
        run: |
          # Retry para 409 (provisioning_in_progress no Coolify, igual apply-tenant.sh).
          # TODO: tenant_subset funciona aqui; refatorar apply-tenant.sh para passar
          # -target via env e centralizar retry+redeploy num lugar so.
          for attempt in 1 2 3; do
            echo "::group::Apply attempt $attempt"
            if terraform apply -auto-approve tfplan.bin; then
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            [[ $attempt -eq 3 ]] && exit 1
            echo "Retrying in 30s..."
            sleep 30
            terraform plan -var-file=../terraform.tfvars ${{ steps.targets.outputs.args }} -out=tfplan.bin
          done

  # -----------------------------------------------------------------------
  # routes: refresh do Coolify proxy (Traefik) - rapido, sem terraform
  # -----------------------------------------------------------------------
  routes:
    needs: [tenant]
    if: |
      always() &&
      (inputs.segment == 'routes' ||
       (inputs.segment == 'all' && (needs.tenant.result == 'success' || needs.tenant.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Refresh Coolify routes
        if: inputs.dry_run == false
        run: |
          chmod +x scripts/refresh-coolify-routes.sh
          BASE_DOMAIN="${BASE_DOMAIN}" PROJECT_ID="${PROJECT_ID}" \
            ZONE="${ZONE}" VM_NAME="${VM_NAME}" \
            ./scripts/refresh-coolify-routes.sh

      - name: Dry-run note
        if: inputs.dry_run == true
        run: echo "::notice::dry_run=true; pulando refresh-coolify-routes.sh."

  # -----------------------------------------------------------------------
  # onboarding: criar admins iniciais (idempotente; safe em re-runs)
  # -----------------------------------------------------------------------
  onboarding:
    needs: [routes]
    if: |
      always() &&
      (inputs.segment == 'onboarding' ||
       (inputs.segment == 'all' && (needs.routes.result == 'success' || needs.routes.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Onboard admins
        if: inputs.dry_run == false
        run: |
          chmod +x scripts/onboard-prod.sh
          ./scripts/onboard-prod.sh

      - name: Dry-run note
        if: inputs.dry_run == true
        run: echo "::notice::dry_run=true; pulando onboard-prod.sh."

  # -----------------------------------------------------------------------
  # validate: smoke checks + Playwright (sempre seguro de rodar)
  # -----------------------------------------------------------------------
  validate:
    needs: [onboarding]
    if: |
      always() &&
      (inputs.segment == 'validate' ||
       (inputs.segment == 'all' && (needs.onboarding.result == 'success' || needs.onboarding.result == 'skipped')))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Health checks
        run: |
          chmod +x scripts/health-check-all.sh
          BASE_DOMAIN="${BASE_DOMAIN}" PROJECT_ID="${PROJECT_ID}" \
            ./scripts/health-check-all.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: onboarding/package-lock.json

      - name: Install Playwright
        working-directory: onboarding
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        working-directory: onboarding
        run: npx playwright test 03-smoke.spec.ts
        env:
          BASE_URL_CHATWOOT: https://chat.${{ env.BASE_DOMAIN }}
          BASE_URL_DIFY: https://dify.${{ env.BASE_DOMAIN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: onboarding/playwright-report
          retention-days: 14
