name: Stack Compose + Playwright (Unified)

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Compose v2.30+ on ubuntu-latest forbids redefining services imported via
    # `include:`. The root docker-compose.yml carries cross-stack `depends_on`
    # overrides, so we chain compose files via -f / COMPOSE_FILE instead.
    env:
      COMPOSE_FILE: deploy/docker-compose.shared.yml:deploy/docker-compose.chatwoot.yml:deploy/docker-compose.dify.yml:deploy/docker-compose.nexaduo.yml:docker-compose.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: onboarding/package-lock.json

      - name: Install dependencies
        working-directory: onboarding
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Prepare .env for CI
        run: |
          cat > .env <<EOF
          COMPOSE_PROJECT_NAME=nexaduo
          TZ=UTC
          ADMIN_EMAIL=alexandre@nexaduo.com
          ADMIN_PASSWORD=AdminPass123!
          NEXADUO_CONF_PATH=${{ github.workspace }}
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          REDIS_PASSWORD=redis
          CHATWOOT_SECRET_KEY_BASE=$(openssl rand -hex 32)
          DIFY_SECRET_KEY=$(openssl rand -hex 32)
          DIFY_SANDBOX_API_KEY=dummy-key
          DIFY_PLUGIN_DAEMON_KEY=dummy-key
          DIFY_PLUGIN_DIFY_INNER_API_KEY=dummy-key
          MIDDLEWARE_IMAGE=ghcr.io/nexaduo/middleware:latest
          SELF_HEALING_IMAGE=ghcr.io/nexaduo/self-healing-agent:latest
          EOF

      - name: Build local images
        run: |
          docker build -t ghcr.io/nexaduo/middleware:latest ./middleware
          docker build -t ghcr.io/nexaduo/self-healing-agent:latest ./agents/self-healing

      - name: Start Stack
        # cloudflared is in deploy/docker-compose.shared.yml; we scale it to 0
        # because CI doesn't have a tunnel token to register. COMPOSE_FILE is
        # set at job level so logs/down steps see the same chain.
        run: |
          docker network create nexaduo-network || true
          docker compose up -d --remove-orphans --scale cloudflared=0

      - name: Stage 1 - Infrastructure Health
        working-directory: onboarding
        run: npx playwright test tests/01-infra.spec.ts

      - name: Stage 2 - Initial Onboarding (Setup)
        working-directory: onboarding
        run: npx playwright test tests/02-setup.spec.ts

      - name: Stage 3 - Functional Smoke Tests
        working-directory: onboarding
        run: npx playwright test tests/03-smoke.spec.ts

      - name: Capture logs on failure
        if: failure()
        run: |
          docker compose logs --tail=100
          docker ps -a

      - name: Teardown
        if: always()
        run: docker compose down -v
