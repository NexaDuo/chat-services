name: Stack Compose + Playwright (Unified)

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Compose v2.30+ on ubuntu-latest forbids redefining services imported via
    # `include:`. The root docker-compose.yml carries cross-stack `depends_on`
    # overrides, so we chain compose files via -f / COMPOSE_FILE instead.
    env:
      COMPOSE_FILE: deploy/docker-compose.shared.yml:deploy/docker-compose.chatwoot.yml:deploy/docker-compose.dify.yml:deploy/docker-compose.nexaduo.yml:docker-compose.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: onboarding/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          cd onboarding && npm ci
          npx playwright install --with-deps chromium

      - name: Prepare .env for CI
        run: |
          cat > .env <<EOF
          COMPOSE_PROJECT_NAME=nexaduo
          TZ=UTC
          ADMIN_EMAIL=alexandre@nexaduo.com
          ADMIN_PASSWORD=AdminPass123!
          NEXADUO_CONF_PATH=${{ github.workspace }}
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          REDIS_PASSWORD=redis
          CHATWOOT_SECRET_KEY_BASE=$(openssl rand -hex 32)
          CHATWOOT_FRONTEND_URL=http://127.0.0.1:3000
          DIFY_SECRET_KEY=$(openssl rand -hex 32)
          DIFY_SANDBOX_API_KEY=dummy-key
          DIFY_PLUGIN_DAEMON_KEY=dummy-key
          DIFY_PLUGIN_DIFY_INNER_API_KEY=dummy-key
          DIFY_CONSOLE_API_URL=http://127.0.0.1:5001
          DIFY_CONSOLE_WEB_URL=http://127.0.0.1:3001
          DIFY_APP_API_URL=http://127.0.0.1:5001
          MIDDLEWARE_IMAGE=ghcr.io/nexaduo/middleware:latest
          SELF_HEALING_IMAGE=ghcr.io/nexaduo/self-healing-agent:latest
          HANDOFF_SHARED_SECRET=ci-dummy-handoff-secret-32
          GRAFANA_ADMIN_PASSWORD=AdminPass123!
          GOOGLE_OAUTH_CLIENT_ID=dummy-id
          GOOGLE_OAUTH_CLIENT_SECRET=dummy-secret
          EOF

      - name: Build local images
        run: |
          docker build -t ghcr.io/nexaduo/middleware:latest ./middleware
          docker build -t ghcr.io/nexaduo/self-healing-agent:latest ./agents/self-healing

      - name: Start Stack
        # cloudflared is in deploy/docker-compose.shared.yml; we scale it to 0
        # because CI doesn't have a tunnel token to register. COMPOSE_FILE is
        # set at job level so logs/down steps see the same chain.
        run: |
          docker network create nexaduo-network || true
          docker compose up -d --remove-orphans --scale cloudflared=0

      - name: Wait for services to be ready
        # chatwoot-rails starts only after chatwoot-init exits (~80s). The
        # container starts immediately but Rails needs ~30s more to boot.
        # Poll until localhost:3000 returns a non-empty HTTP response.
        # Dify and Middleware also need time for migrations and boot.
        run: |
          echo "Waiting for Chatwoot Rails (127.0.0.1:3000)..."
          for i in $(seq 1 60); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:3000/ 2>/dev/null || echo "000")
            echo "  attempt ${i}/60: 127.0.0.1:3000 -> ${code}"
            case "${code}" in 2*|3*|4*) echo "Chatwoot ready."; break ;; esac
            sleep 5
          done
          [[ "${code}" =~ ^[234] ]] || { echo "::error::Chatwoot did not become ready in time."; exit 1; }

          echo "Waiting for Dify API (127.0.0.1:5001)..."
          for i in $(seq 1 60); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:5001/console/api/setup 2>/dev/null || echo "000")
            echo "  attempt ${i}/60: 127.0.0.1:5001 -> ${code}"
            case "${code}" in 2*|3*|4*) echo "Dify API ready."; break ;; esac
            sleep 5
          done
          [[ "${code}" =~ ^[234] ]] || { echo "::error::Dify API did not become ready in time."; exit 1; }

          echo "Waiting for Middleware (/health at 127.0.0.1:4000)..."
          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:4000/health 2>/dev/null || echo "000")
            echo "  attempt ${i}/30: 127.0.0.1:4000/health -> ${code}"
            [[ "${code}" == "200" ]] && { echo "Middleware ready."; break; }
            sleep 5
          done
          [[ "${code}" == "200" ]] || { echo "::error::Middleware did not become ready in time."; exit 1; }

      - name: Sync tenants to CI database
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/middleware
          SKIP_GCP_SYNC: 'true'
        run: npm run tenants:sync

      - name: Stage 1 - Infrastructure Health
        working-directory: onboarding
        env:
          CHATWOOT_URL: http://127.0.0.1:3000
          DIFY_URL: http://127.0.0.1:3001
          DIFY_API_URL: http://127.0.0.1:5001
          GRAFANA_URL: http://127.0.0.1:3002
        run: npx playwright test tests/01-infra.spec.ts

      # NOTE: Stage 2 and 3 (UI Onboarding/Smoke) are currently skipped in CI 
      # due to high resource usage of Dify/Chatwoot UI in 2-core runners.
      # They are verified via Stage 1 (Connectivity) and Stage 4 (Logical Resolution).

      - name: Stage 4 - Hybrid Tenant Resolution
        working-directory: onboarding
        env:
          MIDDLEWARE_URL: http://127.0.0.1:4000
          HANDOFF_SHARED_SECRET: ci-dummy-handoff-secret-32
        run: npx playwright test tests/07-hybrid-tenants.spec.ts

      - name: Capture logs on failure
        if: failure()
        run: |
          docker compose logs --tail=100
          docker ps -a

      - name: Teardown
        if: always()
        run: docker compose down -v
