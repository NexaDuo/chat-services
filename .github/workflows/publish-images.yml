name: Publish images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Extra tag to apply (in addition to sha-<short>).
        required: false

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: nexaduo-492818/nexaduo
  # Populated by `terraform output -raw gh_workload_identity_provider` on the
  # foundation layer; full form is
  # projects/<num>/locations/global/workloadIdentityPools/github/providers/nexaduo-chat-services
  WORKLOAD_IDENTITY_PROVIDER: projects/205245484827/locations/global/workloadIdentityPools/github/providers/nexaduo-chat-services
  SERVICE_ACCOUNT: gh-publisher@nexaduo-492818.iam.gserviceaccount.com

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: middleware
            context: middleware
          - name: self-healing-agent
            context: agents/self-healing
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ matrix.name }}
          tags: |
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
